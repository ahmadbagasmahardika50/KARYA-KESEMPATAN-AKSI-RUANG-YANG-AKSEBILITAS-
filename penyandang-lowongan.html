<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya - KARYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Lexend', sans-serif; }</style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow px-6 py-3">
        <a href="penyandang-lowongan.html" class="text-blue-600 hover:underline">← Kembali ke Lowongan</a>
    </nav>
    <div class="max-w-2xl mx-auto px-6 py-12">
        <div class="bg-white p-8 rounded-2xl shadow-md">
            <h1 class="text-2xl font-bold text-blue-900">Profil Saya</h1>
            <form id="form" class="mt-6">
                <div class="mb-4">
                    <label class="block font-bold">Nama Lengkap</label>
                    <input type="text" id="nama" class="w-full p-3 rounded-xl bg-gray-100" value="Budi Santoso">
                </div>
                <div class="mb-4">
                    <label class="block font-bold">Email</label>
                    <input type="email" id="email" class="w-full p-3 rounded-xl bg-gray-100" value="budi@example.com" readonly>
                </div>
                <div class="mb-4">
                    <label class="block font-bold">Jenis Disabilitas</label>
                    <select id="jenis" class="w-full p-3 rounded-xl bg-gray-100">
                        <option>Fisik</option><option>Netra</option><option>Rungu</option><option>Mental</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block font-bold">Nomor Telepon</label>
                    <input type="tel" id="telepon" class="w-full p-3 rounded-xl bg-gray-100" value="08123456789">
                </div>
                <div class="mb-4">
                    <label class="block font-bold">Pendidikan Terakhir</label>
                    <input type="text" id="pendidikan" class="w-full p-3 rounded-xl bg-gray-100" value="S1 Informatika">
                </div>
                <div class="mb-4">
                    <label class="block font-bold">Alamat</label>
                    <textarea id="alamat" class="w-full p-3 rounded-xl bg-gray-100">Jl. Merdeka No. 10, Surakarta</textarea>
                </div>
                <div class="flex gap-3">
                    <button type="button" id="resetBtn" class="border border-blue-900 text-blue-900 px-6 py-3 rounded-xl font-bold hover:bg-blue-50">Reset</button>
                    <button type="submit" class="bg-blue-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-800">Simpan Perubahan</button>
                </div>
            </form>

            <hr class="my-8">

            <h2 class="text-xl font-bold text-blue-900">Riwayat Pendidikan / Pelatihan</h2>
            <div id="riwayatList" class="mt-4 space-y-2"></div>
            <div class="flex gap-2 mt-4">
                <input type="text" id="riwayatInput" placeholder="Tambah riwayat baru" class="flex-1 p-2 rounded-xl bg-gray-100">
                <button id="tambahRiwayat" class="bg-amber-500 text-white px-4 py-2 rounded-xl">Tambah</button>
            </div>

            <hr class="my-8">

            <div class="bg-red-50 p-4 rounded-xl border border-red-200">
                <h3 class="text-lg font-bold text-red-800">Hapus Akun</h3>
                <p class="text-sm text-red-600 mt-1">Tindakan ini tidak dapat dibatalkan. Semua data Anda akan dihapus permanen.</p>
                <button id="hapusAkun" class="mt-3 bg-red-700 text-white px-4 py-2 rounded-xl hover:bg-red-800">Hapus Akun Saya</button>
            </div>
        </div>
    </div>

    <script>
        let riwayat = [
            { id: 1, teks: "SMK Negeri 2 Surakarta (2015-2018)" },
            { id: 2, teks: "Pelatihan Web Accessibility (2023)" }
        ];

        function renderRiwayat() {
            let html = '';
            riwayat.forEach(r => {
                html += `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                    <span>${r.teks}</span>
                    <button class="hapusRiwayat text-red-600" data-id="${r.id}">Hapus</button>
                </div>`;
            });
            document.getElementById('riwayatList').innerHTML = html;
        }

        document.getElementById('form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Profil berhasil diperbarui!');
        });
        document.getElementById('resetBtn').onclick = () => {
            document.getElementById('nama').value = 'Budi Santoso';
            document.getElementById('jenis').value = 'Fisik';
            document.getElementById('telepon').value = '08123456789';
            document.getElementById('pendidikan').value = 'S1 Informatika';
            document.getElementById('alamat').value = 'Jl. Merdeka No. 10, Surakarta';
            alert('Form direset ke data awal');
        };
        document.getElementById('tambahRiwayat').onclick = () => {
            const teks = document.getElementById('riwayatInput').value.trim();
            if (teks) {
                riwayat.push({ id: Date.now(), teks: teks });
                renderRiwayat();
                document.getElementById('riwayatInput').value = '';
                alert('Riwayat ditambahkan');
            }
        };
        document.getElementById('riwayatList').addEventListener('click', (e) => {
            if (e.target.classList.contains('hapusRiwayat')) {
                const id = e.target.getAttribute('data-id');
                riwayat = riwayat.filter(r => r.id != id);
                renderRiwayat();
                alert('Riwayat dihapus');
            }
        });
        document.getElementById('hapusAkun').onclick = () => {
            if (confirm('PERINGATAN: Semua data Anda akan dihapus permanen. Lanjutkan?')) {
                alert('Akun telah dihapus. Anda akan diarahkan ke halaman utama.');
                window.location.href = 'index.html';
            }
        };
        renderRiwayat();
    </script>
</body>
</html>
