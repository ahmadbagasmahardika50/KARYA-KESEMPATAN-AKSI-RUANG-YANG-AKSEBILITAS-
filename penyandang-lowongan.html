<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARYA - Cari Lowongan Pekerjaan</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons (opsional) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :focus {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            transition: transform 0.2s ease;
        }
        .status-badge {
            @apply px-2 py-1 rounded-full text-xs font-semibold;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-10">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center flex-wrap gap-3">
            <h1 class="text-2xl font-bold text-blue-800">Sistem KARYA</h1>
            <div class="flex items-center space-x-4">
                <span class="text-gray-700"><i class="fas fa-user-circle mr-1"></i> Alya Yumna</span>
                <button class="bg-red-600 text-white px-3 py-1 rounded-md hover:bg-red-700 focus:ring-2" aria-label="Logout">
                    <i class="fas fa-sign-out-alt mr-1"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Judul Halaman -->
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Cari Lowongan Pekerjaan</h2>
            <p class="text-gray-600">Temukan lowongan yang sesuai dengan kemampuan dan kebutuhan Anda</p>
        </div>

        <!-- Form Pencarian & Filter -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label for="search-keyword" class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-search mr-1"></i> Kata Kunci
                    </label>
                    <input type="text" id="search-keyword" placeholder="Cari judul lowongan, perusahaan, atau lokasi..." 
                           class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="filter-jenis" class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-wheelchair mr-1"></i> Jenis Disabilitas
                    </label>
                    <select id="filter-jenis" class="w-full border border-gray-300 rounded-md p-2">
                        <option value="">Semua Jenis</option>
                        <option value="Fisik">Fisik (Daksa)</option>
                        <option value="Netra">Netra</option>
                        <option value="Rungu">Rungu (Tuli/Wicara)</option>
                        <option value="Mental">Mental</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div>
                    <label for="filter-lokasi" class="block text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-map-marker-alt mr-1"></i> Lokasi
                    </label>
                    <select id="filter-lokasi" class="w-full border border-gray-300 rounded-md p-2">
                        <option value="">Semua Lokasi</option>
                        <option value="Surakarta">Surakarta</option>
                        <option value="Jakarta">Jakarta</option>
                        <option value="Bandung">Bandung</option>
                        <option value="Semarang">Semarang</option>
                        <option value="Surabaya">Surabaya</option>
                        <option value="Remote">Remote (Work From Home)</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end mt-4 gap-2">
                <button id="reset-filter" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                    <i class="fas fa-undo-alt mr-1"></i> Reset
                </button>
                <button id="btn-cari" class="bg-blue-700 text-white px-6 py-2 rounded-md hover:bg-blue-800 focus:ring-2">
                    <i class="fas fa-search mr-1"></i> Cari Lowongan
                </button>
            </div>
        </div>

        <!-- Hasil Pencarian -->
        <div class="mb-4 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-gray-800">
                <i class="fas fa-briefcase mr-2"></i> Hasil Pencarian
                <span id="result-count" class="text-sm text-gray-500 font-normal ml-2"></span>
            </h3>
            <div>
                <label for="sort-by" class="text-sm text-gray-600 mr-2">Urutkan:</label>
                <select id="sort-by" class="border border-gray-300 rounded-md p-1 text-sm">
                    <option value="terbaru">Terbaru</option>
                    <option value="terlama">Terlama</option>
                </select>
            </div>
        </div>

        <!-- Daftar Lowongan (Card Grid) -->
        <div id="lowongan-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Data akan diisi JavaScript -->
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="text-center py-8 hidden">
            <i class="fas fa-spinner fa-spin text-3xl text-blue-600"></i>
            <p class="text-gray-500 mt-2">Memuat lowongan...</p>
        </div>

        <!-- Tidak Ada Data -->
        <div id="no-data" class="text-center py-12 hidden">
            <i class="fas fa-folder-open text-5xl text-gray-400 mb-3"></i>
            <p class="text-gray-500">Tidak ditemukan lowongan yang sesuai.</p>
            <p class="text-gray-400 text-sm">Coba ubah kata kunci atau filter pencarian Anda.</p>
        </div>

        <!-- Paginasi -->
        <div class="flex justify-between items-center mt-8">
            <button id="prev-page" class="px-4 py-2 bg-gray-200 rounded-md disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-300">
                <i class="fas fa-chevron-left mr-1"></i> Sebelumnya
            </button>
            <span id="page-info" class="text-sm text-gray-600">Halaman 1 dari 1</span>
            <button id="next-page" class="px-4 py-2 bg-gray-200 rounded-md disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-300">
                Selanjutnya <i class="fas fa-chevron-right ml-1"></i>
            </button>
        </div>
    </main>

    <script>
        // Data Dummy Lowongan
        let lowonganData = [
            { 
                id: 1, 
                judul: "Frontend Developer", 
                perusahaan: "PT. Teknologi Inklusif", 
                lokasi: "Surakarta",
                jenis_disabilitas: "Fisik",
                deskripsi: "Mengembangkan antarmuka web yang aksesibel. WFH 2x seminggu.",
                tgl_posting: "2026-06-01",
                gaji: "Rp 4.500.000 - Rp 6.000.000",
                status: "dibuka"
            },
            { 
                id: 2, 
                judul: "Admin Data Entry", 
                perusahaan: "CV. Maju Bersama", 
                lokasi: "Remote",
                jenis_disabilitas: "Netra",
                deskripsi: "Menginput data dengan software screen reader friendly.",
                tgl_posting: "2026-06-03",
                gaji: "Rp 3.500.000 - Rp 4.500.000",
                status: "dibuka"
            },
            { 
                id: 3, 
                judul: "Customer Service", 
                perusahaan: "PT. Layanan Ramah", 
                lokasi: "Jakarta",
                jenis_disabilitas: "Rungu",
                deskripsi: "Melayani pelanggan melalui chat dan email. Pelatihan disediakan.",
                tgl_posting: "2026-06-05",
                gaji: "Rp 4.000.000 - Rp 5.500.000",
                status: "dibuka"
            },
            { 
                id: 4, 
                judul: "Graphic Designer", 
                perusahaan: "Studio Kreatif Inklusi", 
                lokasi: "Bandung",
                jenis_disabilitas: "Fisik",
                deskripsi: "Desain grafis untuk konten media sosial dan website.",
                tgl_posting: "2026-06-07",
                gaji: "Rp 5.000.000 - Rp 7.000.000",
                status: "dibuka"
            },
            { 
                id: 5, 
                judul: "Software Tester (QA)", 
                perusahaan: "PT. Quality For All", 
                lokasi: "Semarang",
                jenis_disabilitas: "Mental",
                deskripsi: "Menguji aplikasi dan melaporkan bug. Lingkungan kerja suportif.",
                tgl_posting: "2026-06-02",
                gaji: "Rp 4.500.000 - Rp 6.500.000",
                status: "dibuka"
            },
            { 
                id: 6, 
                judul: "Content Writer", 
                perusahaan: "Media Inklusif", 
                lokasi: "Remote",
                jenis_disabilitas: "Lainnya",
                deskripsi: "Menulis artikel tentang isu disabilitas dan inklusi.",
                tgl_posting: "2026-06-04",
                gaji: "Rp 3.500.000 - Rp 5.000.000",
                status: "dibuka"
            }
        ];

        let filteredData = [...lowonganData];
        let currentPage = 1;
        const rowsPerPage = 6;

        // Fungsi format tanggal
        function formatDate(dateString) {
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        }

        // Render daftar lowongan
        function renderLowongan() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filteredData.slice(start, end);
            const container = document.getElementById('lowongan-container');
            const resultCount = document.getElementById('result-count');
            
            resultCount.textContent = `(${filteredData.length} lowongan ditemukan)`;
            
            if (pageData.length === 0) {
                document.getElementById('no-data').classList.remove('hidden');
                container.innerHTML = '';
                return;
            }
            
            document.getElementById('no-data').classList.add('hidden');
            container.innerHTML = '';
            
            pageData.forEach(lowongan => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow-md p-5 border border-gray-100 card-hover transition-all';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="text-lg font-bold text-gray-800">${lowongan.judul}</h4>
                        <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">${lowongan.status === 'dibuka' ? 'Dibuka' : 'Ditutup'}</span>
                    </div>
                    <p class="text-gray-600 text-sm mb-2"><i class="fas fa-building mr-2 text-gray-400"></i>${lowongan.perusahaan}</p>
                    <p class="text-gray-600 text-sm mb-2"><i class="fas fa-map-marker-alt mr-2 text-gray-400"></i>${lowongan.lokasi}</p>
                    <p class="text-gray-600 text-sm mb-2"><i class="fas fa-wheelchair mr-2 text-gray-400"></i>Disabilitas: ${lowongan.jenis_disabilitas}</p>
                    <p class="text-gray-600 text-sm mb-2"><i class="fas fa-money-bill-wave mr-2 text-gray-400"></i>${lowongan.gaji}</p>
                    <p class="text-gray-500 text-sm mb-3 line-clamp-2">${lowongan.deskripsi.substring(0, 100)}${lowongan.deskripsi.length > 100 ? '...' : ''}</p>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t border-gray-100">
                        <span class="text-xs text-gray-400"><i class="far fa-calendar-alt mr-1"></i>Diposting: ${formatDate(lowongan.tgl_posting)}</span>
                        <button class="bg-blue-600 text-white px-3 py-1 rounded-md text-sm hover:bg-blue-700 detail-btn" data-id="${lowongan.id}">
                            <i class="fas fa-eye mr-1"></i> Lihat Detail
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
            
            // Update paginasi info
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            document.getElementById('page-info').innerHTML = `Halaman ${currentPage} dari ${totalPages || 1}`;
            document.getElementById('prev-page').disabled = currentPage === 1;
            document.getElementById('next-page').disabled = currentPage === totalPages || filteredData.length === 0;
        }

        // Filter dan pencarian
        function applyFilters() {
            const keyword = document.getElementById('search-keyword').value.toLowerCase();
            const jenisFilter = document.getElementById('filter-jenis').value;
            const lokasiFilter = document.getElementById('filter-lokasi').value;
            const sortBy = document.getElementById('sort-by').value;
            
            filteredData = lowonganData.filter(lowongan => {
                let matchKeyword = true;
                if (keyword) {
                    matchKeyword = lowongan.judul.toLowerCase().includes(keyword) || 
                                   lowongan.perusahaan.toLowerCase().includes(keyword) ||
                                   lowongan.lokasi.toLowerCase().includes(keyword);
                }
                let matchJenis = jenisFilter ? lowongan.jenis_disabilitas === jenisFilter : true;
                let matchLokasi = lokasiFilter ? lowongan.lokasi === lokasiFilter : true;
                return matchKeyword && matchJenis && matchLokasi;
            });
            
            // Sorting
            if (sortBy === 'terbaru') {
                filteredData.sort((a, b) => new Date(b.tgl_posting) - new Date(a.tgl_posting));
            } else {
                filteredData.sort((a, b) => new Date(a.tgl_posting) - new Date(b.tgl_posting));
            }
            
            currentPage = 1;
            renderLowongan();
        }

        // Reset filter
        function resetFilters() {
            document.getElementById('search-keyword').value = '';
            document.getElementById('filter-jenis').value = '';
            document.getElementById('filter-lokasi').value = '';
            document.getElementById('sort-by').value = 'terbaru';
            applyFilters();
        }

        // Event Listeners
        document.getElementById('btn-cari').addEventListener('click', applyFilters);
        document.getElementById('reset-filter').addEventListener('click', resetFilters);
        document.getElementById('sort-by').addEventListener('change', applyFilters);
        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderLowongan();
            }
        });
        document.getElementById('next-page').addEventListener('click', () => {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderLowongan();
            }
        });
        
        // Enter key pada input pencarian
        document.getElementById('search-keyword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') applyFilters();
        });
        
        // Tombol detail (navigasi ke halaman pendaftaran)
        document.getElementById('lowongan-container').addEventListener('click', (e) => {
            const detailBtn = e.target.closest('.detail-btn');
            if (detailBtn) {
                const lowonganId = detailBtn.getAttribute('data-id');
                // Simpan ke localStorage untuk dibawa ke halaman pendaftaran
                localStorage.setItem('lowonganDipilih', JSON.stringify({
                    id: lowonganId,
                    dariHalaman: 'cari-lowongan'
                }));
                // Arahkan ke halaman pendaftaran
                window.location.href = 'penyandang-daftar-lowongan.html';
            }
        });
        
        // Inisialisasi
        applyFilters();
    </script>
</body>
</html>
