<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KARYA - Cari Lowongan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background: #f3f4f6; }
        .table-row-hover:hover { background-color: #f9fafb; }
        .btn-primary {
            background-color: #001855;
            color: white;
        }
        .btn-primary:hover {
            background-color: #002a84;
        }
        .btn-accent {
            background-color: #feb700;
            color: #001855;
        }
        .btn-accent:hover {
            background-color: #e5a500;
        }
        .focus-ring:focus {
            outline: 2px solid #feb700;
            outline-offset: 2px;
        }
        /* status badge */
        .status-pending { background-color: #fef3c7; color: #b45309; }
        .status-diproses { background-color: #dbeafe; color: #1e40af; }
        .status-interview { background-color: #d1fae5; color: #065f46; }
        .status-diterima { background-color: #a7f3d0; color: #064e3b; }
        .status-ditolak { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Navbar Horizontal -->
    <nav class="bg-white shadow-md px-6 py-3 flex justify-between items-center border-b border-gray-200">
        <div class="text-2xl font-black text-[#001855] tracking-tight">KARYA Pelamar</div>
        <div class="flex items-center space-x-6">
            <span class="text-sm text-gray-700 hidden md:inline">Halo, <span id="user-name-display" class="font-semibold">Penyandang</span></span>
            <!-- Lamaran Saya -->
            <a href="#" id="riwayatBtn" class="text-[#001855] hover:text-[#feb700] transition flex items-center gap-1">
                <span class="material-symbols-outlined text-base">history</span> Lamaran Saya
            </a>
            <a href="penyandang-profil.html" class="text-[#001855] hover:text-[#feb700] transition flex items-center gap-1">
                <span class="material-symbols-outlined text-base">account_circle</span> Profil
            </a>
            <a href="login.html" class="text-red-600 hover:text-red-800 transition flex items-center gap-1">
                <span class="material-symbols-outlined text-base">logout</span> Logout
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-[#001855]">Cari Lowongan Kerja</h1>
            <p class="text-gray-500">Temukan lowongan yang ramah disabilitas</p>
        </div>

        <!-- Filter Section -->
        <div class="bg-white rounded-xl shadow-md p-5 mb-6 border border-gray-100">
            <div class="flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Kata Kunci</label>
                    <input type="text" id="cari" placeholder="Judul atau perusahaan" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#feb700] focus:border-[#feb700] outline-none">
                </div>
                <div class="w-48">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Disabilitas</label>
                    <select id="filterJenis" class="w-full p-2 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-[#feb700] focus:border-[#feb700] outline-none">
                        <option value="">Semua</option>
                        <option>Fisik</option><option>Netra</option><option>Rungu</option><option>Mental</option>
                    </select>
                </div>
                <button id="btnCari" class="btn-primary px-5 py-2 rounded-lg transition flex items-center gap-1 shadow-sm">
                    <span class="material-symbols-outlined text-sm">search</span> Cari
                </button>
            </div>
        </div>

        <!-- Tabel Lowongan -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Judul</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Perusahaan</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Lokasi</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Disabilitas</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-lowongan" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
            </div>
            <div id="empty-row" class="text-center py-12 text-gray-500 hidden">Belum ada lowongan tersedia.</div>
        </div>
    </main>

    <!-- Modal Detail Lowongan -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-xl p-6">
            <h3 class="text-xl font-bold text-[#001855] mb-4">Detail Lowongan</h3>
            <div id="modalContent"></div>
            <div class="flex justify-end gap-2 mt-4">
                <button id="closeModal" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition">Tutup</button>
                <button id="lamarBtn" class="btn-accent px-4 py-2 rounded-lg font-medium transition shadow-sm">Lamar Sekarang</button>
            </div>
        </div>
    </div>

    <!-- Modal Riwayat Lamaran (dengan tombol hapus, tanpa update status) -->
    <div id="riwayatModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-4xl max-h-[80vh] overflow-y-auto shadow-xl">
            <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold text-[#001855] flex items-center gap-2">
                    <span class="material-symbols-outlined">receipt_long</span> Riwayat Lamaran Saya
                </h3>
                <button id="closeRiwayatModal" class="text-gray-500 hover:text-gray-700">&times;</button>
            </div>
            <div class="p-4">
                <div id="daftarLamaranContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modal Detail Lamaran -->
    <div id="detailLamaranModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-xl p-6">
            <h3 class="text-xl font-bold text-[#001855] mb-4">Detail Lamaran</h3>
            <div id="detailLamaranContent"></div>
            <div class="flex justify-end mt-4">
                <button id="closeDetailLamaranModal" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== USER DISPLAY ====================
        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (currentUser && currentUser.role === 'penyandang') {
            document.getElementById('user-name-display').innerText = currentUser.nama || currentUser.email.split('@')[0];
        } else {
            document.getElementById('user-name-display').innerText = 'Pengunjung';
        }
        const userEmail = currentUser ? currentUser.email : '';

        // ==================== AMBIL DATA LOWONGAN ====================
        function getLowongan() {
            const stored = localStorage.getItem('daftarLowongan');
            return stored ? JSON.parse(stored) : [];
        }

        let semuaLowongan = [];
        let currentLowonganId = null;

        // ==================== LAMARAN ====================
        function getLamaranUser() {
            const allLamaran = JSON.parse(localStorage.getItem('daftarLamaran') || '[]');
            return allLamaran.filter(l => l.pelamarEmail === userEmail);
        }

        function hapusLamaran(id) {
            let allLamaran = JSON.parse(localStorage.getItem('daftarLamaran') || '[]');
            allLamaran = allLamaran.filter(l => !(l.pelamarEmail === userEmail && l.id === id));
            localStorage.setItem('daftarLamaran', JSON.stringify(allLamaran));
            renderRiwayatLamaran(); // refresh modal
        }

        // Render daftar lamaran (tombol Detail + Hapus, tanpa update status)
        function renderRiwayatLamaran() {
            const lamaranUser = getLamaranUser();
            const container = document.getElementById('daftarLamaranContainer');
            if (lamaranUser.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-500">Belum ada lamaran yang dikirim.</div>';
                return;
            }
            let html = `<div class="overflow-x-auto"><table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr><th class="px-4 py-2 text-left text-xs font-medium">Judul Lowongan</th><th class="px-4 py-2 text-left text-xs font-medium">Perusahaan</th><th class="px-4 py-2 text-left text-xs font-medium">Tanggal Lamar</th><th class="px-4 py-2 text-left text-xs font-medium">Status</th><th class="px-4 py-2 text-center text-xs font-medium">Aksi</th></tr>
                </thead><tbody>`;
            lamaranUser.forEach(l => {
                let statusClass = '';
                if (l.status === 'pending') statusClass = 'status-pending';
                else if (l.status === 'diproses') statusClass = 'status-diproses';
                else if (l.status === 'interview') statusClass = 'status-interview';
                else if (l.status === 'diterima') statusClass = 'status-diterima';
                else if (l.status === 'ditolak') statusClass = 'status-ditolak';
                else statusClass = 'bg-gray-100';
                const statusText = {
                    'pending': 'Menunggu',
                    'diproses': 'Sedang Diproses',
                    'interview': 'Undangan Interview',
                    'diterima': 'Diterima',
                    'ditolak': 'Ditolak'
                }[l.status] || l.status;
                html += `<tr class="border-b">
                    <td class="px-4 py-2">${escapeHtml(l.judulLowongan)}</td>
                    <td class="px-4 py-2">${escapeHtml(l.perusahaan)}</td>
                    <td class="px-4 py-2">${l.tglLamaran}</td>
                    <td class="px-4 py-2"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusClass}">${statusText}</span></td>
                    <td class="px-4 py-2 text-center">
                        <button class="detailLamaranBtn text-blue-600 hover:text-blue-800 mr-2" data-id="${l.id}">Detail</button>
                        <button class="hapusLamaranBtn text-red-600 hover:text-red-800" data-id="${l.id}">Hapus</button>
                    </td>
                 </tr>`;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;

            // Event listeners untuk tombol detail
            document.querySelectorAll('.detailLamaranBtn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    const lamaran = lamaranUser.find(l => l.id === id);
                    if (lamaran) showDetailLamaran(lamaran);
                });
            });
            // Event listeners untuk tombol hapus
            document.querySelectorAll('.hapusLamaranBtn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    if (confirm('Hapus lamaran ini? Tindakan tidak dapat dibatalkan.')) {
                        hapusLamaran(id);
                    }
                });
            });
        }

        function showDetailLamaran(lamaran) {
            const content = document.getElementById('detailLamaranContent');
            content.innerHTML = `
                <p><strong>Lowongan:</strong> ${escapeHtml(lamaran.judulLowongan)}</p>
                <p><strong>Perusahaan:</strong> ${escapeHtml(lamaran.perusahaan)}</p>
                <p><strong>Tanggal Lamar:</strong> ${lamaran.tglLamaran}</p>
                <p><strong>Status:</strong> ${lamaran.status}</p>
                <p><strong>Nama Pelamar:</strong> ${escapeHtml(lamaran.pelamarNama)}</p>
                <p><strong>Email:</strong> ${escapeHtml(lamaran.pelamarEmail)}</p>
                <p><strong>Telepon:</strong> ${escapeHtml(lamaran.telepon)}</p>
                <p><strong>Jenis Disabilitas:</strong> ${escapeHtml(lamaran.jenisDisabilitas)}</p>
                <p><strong>Alamat:</strong> ${escapeHtml(lamaran.alamat)}</p>
                <p><strong>Pendidikan:</strong> ${escapeHtml(lamaran.pendidikan)}</p>
                <p><strong>Pengalaman:</strong> ${escapeHtml(lamaran.pengalaman)}</p>
                <p><strong>CV:</strong> ${escapeHtml(lamaran.cvFileName)}</p>
                ${lamaran.ijazahFileName ? `<p><strong>Ijazah:</strong> ${escapeHtml(lamaran.ijazahFileName)}</p>` : ''}
            `;
            document.getElementById('detailLamaranModal').style.display = 'flex';
        }

        // ==================== FUNGSI LOWONGAN (sama) ====================
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

        function renderTable(data) {
            const tbody = document.getElementById('tabel-lowongan');
            const emptyDiv = document.getElementById('empty-row');
            if (!data.length) {
                tbody.innerHTML = '';
                emptyDiv.classList.remove('hidden');
                return;
            }
            emptyDiv.classList.add('hidden');
            let html = '';
            data.forEach(l => {
                const statusBadge = l.status === 'Aktif' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
                html += `<tr class="table-row-hover">
                    <td class="px-6 py-4">${escapeHtml(l.judul)}</td>
                    <td class="px-6 py-4">${escapeHtml(l.perusahaan)}</td>
                    <td class="px-6 py-4">${escapeHtml(l.lokasi)}</td>
                    <td class="px-6 py-4">${escapeHtml(l.jenis_disabilitas || l.jenis)}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusBadge}">${escapeHtml(l.status || 'Aktif')}</span></td>
                    <td class="px-6 py-4 text-center"><button class="detailBtn text-[#001855] hover:text-[#feb700] font-medium" data-id="${l.id}">Detail</button></td>
                 </tr>`;
            });
            tbody.innerHTML = html;
        }

        function applyFilter() {
            const keyword = document.getElementById('cari').value.toLowerCase();
            const jenis = document.getElementById('filterJenis').value;
            let filtered = semuaLowongan.filter(l => {
                if (l.status && l.status !== 'Aktif') return false;
                const matchKeyword = (l.judul && l.judul.toLowerCase().includes(keyword)) || (l.perusahaan && l.perusahaan.toLowerCase().includes(keyword));
                const matchJenis = !jenis || (l.jenis_disabilitas === jenis || l.jenis === jenis);
                return matchKeyword && matchJenis;
            });
            renderTable(filtered);
        }

        function showDetail(id) {
            const lowongan = semuaLowongan.find(l => l.id == id);
            if (lowongan) {
                currentLowonganId = id;
                document.getElementById('modalContent').innerHTML = `<p><strong>Judul:</strong> ${escapeHtml(lowongan.judul)}</p><p><strong>Perusahaan:</strong> ${escapeHtml(lowongan.perusahaan)}</p><p><strong>Lokasi:</strong> ${escapeHtml(lowongan.lokasi)}</p><p><strong>Disabilitas:</strong> ${escapeHtml(lowongan.jenis_disabilitas)}</p><p><strong>Deskripsi:</strong> ${escapeHtml(lowongan.deskripsi)}</p><p><strong>Gaji:</strong> ${escapeHtml(lowongan.gaji || 'Tidak disebutkan')}</p><p><strong>Tanggal Posting:</strong> ${lowongan.tgl_posting ? new Date(lowongan.tgl_posting).toLocaleDateString('id-ID') : '-'}</p>`;
                document.getElementById('modal').style.display = 'flex';
            }
        }

        function lamar() {
            if (currentLowonganId) {
                const lowonganDipilih = semuaLowongan.find(l => l.id == currentLowonganId);
                if (lowonganDipilih) {
                    localStorage.setItem('lowonganDipilih', JSON.stringify(lowonganDipilih));
                    window.location.href = 'penyandang-daftar.html';
                } else alert('Data lowongan tidak ditemukan');
            }
        }

        // Event listeners
        document.getElementById('btnCari').addEventListener('click', applyFilter);
        document.getElementById('cari').addEventListener('keypress', (e) => { if (e.key === 'Enter') applyFilter(); });
        document.getElementById('filterJenis').addEventListener('change', applyFilter);
        document.getElementById('tabel-lowongan').addEventListener('click', (e) => {
            if (e.target.classList.contains('detailBtn')) showDetail(parseInt(e.target.getAttribute('data-id')));
        });
        document.getElementById('closeModal').addEventListener('click', () => document.getElementById('modal').style.display = 'none');
        document.getElementById('lamarBtn').addEventListener('click', lamar);
        window.addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; });
        window.addEventListener('storage', (e) => { if (e.key === 'daftarLowongan') loadData(); });

        // Riwayat modal
        const riwayatModal = document.getElementById('riwayatModal');
        const riwayatBtn = document.getElementById('riwayatBtn');
        const closeRiwayatModal = document.getElementById('closeRiwayatModal');
        riwayatBtn.addEventListener('click', (e) => {
            e.preventDefault();
            renderRiwayatLamaran();
            riwayatModal.style.display = 'flex';
        });
        closeRiwayatModal.addEventListener('click', () => riwayatModal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === riwayatModal) riwayatModal.style.display = 'none'; });

        // Modal detail lamaran
        const detailLamaranModal = document.getElementById('detailLamaranModal');
        const closeDetailLamaranModal = document.getElementById('closeDetailLamaranModal');
        closeDetailLamaranModal.addEventListener('click', () => detailLamaranModal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === detailLamaranModal) detailLamaranModal.style.display = 'none'; });

        function loadData() { semuaLowongan = getLowongan(); applyFilter(); }
        loadData();
    </script>
</body>
</html>
