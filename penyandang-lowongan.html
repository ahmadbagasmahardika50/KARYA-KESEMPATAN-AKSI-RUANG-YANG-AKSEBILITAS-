<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cari Lowongan - KARYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-black text-blue-900">KARYA</div>
        <div class="space-x-4">
            <a href="penyandang-profil.html" class="text-blue-600 hover:underline">Profil</a>
            <a href="login.html" class="text-red-600 hover:underline">Logout</a>
        </div>
    </nav>
    <div class="max-w-6xl mx-auto px-6 py-8">
        <h1 class="text-2xl font-bold text-blue-900">Cari Lowongan Kerja</h1>
        <div class="mt-4 flex flex-wrap gap-4">
            <input type="text" id="cari" placeholder="Kata kunci (judul, perusahaan)" class="flex-1 p-3 rounded-xl bg-white border border-gray-300">
            <select id="filterJenis" class="p-3 rounded-xl bg-white border border-gray-300">
                <option value="">Semua Disabilitas</option>
                <option>Fisik</option>
                <option>Netra</option>
                <option>Rungu</option>
                <option>Mental</option>
            </select>
            <button id="btnCari" class="bg-blue-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-800">Cari</button>
        </div>
        <div id="list" class="grid md:grid-cols-2 gap-6 mt-8"></div>
    </div>

    <!-- Modal Detail Lowongan -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Detail Lowongan</h3>
            <div id="modalContent"></div>
            <div class="flex justify-end gap-2 mt-4">
                <button id="closeModal" class="bg-gray-300 px-4 py-2 rounded">Tutup</button>
                <button id="lamarBtn" class="bg-amber-500 text-white px-4 py-2 rounded hover:bg-amber-600">Lamar Sekarang</button>
            </div>
        </div>
    </div>

    <script>
        function getLowongan() {
            const stored = localStorage.getItem('daftarLowongan');
            if (stored) {
                try { return JSON.parse(stored); } catch(e) { return []; }
            }
            return [];
        }

        let semuaLowongan = [];
        let currentLowonganId = null;

        function render(data) {
            const container = document.getElementById('list');
            if (!data.length) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">Belum ada lowongan tersedia. Silakan cek kembali nanti.</div>`;
                return;
            }
            let html = '';
            data.forEach(l => {
                html += `<div class="bg-white p-5 rounded-2xl shadow-md border border-gray-200">
                    <h3 class="text-xl font-bold text-blue-900">${escapeHtml(l.judul)}</h3>
                    <p class="text-gray-600">${escapeHtml(l.perusahaan)} • ${escapeHtml(l.lokasi)}</p>
                    <p class="text-gray-500 text-sm mt-1">Disabilitas: ${escapeHtml(l.jenis_disabilitas || l.jenis)}</p>
                    <p class="mt-2 text-gray-700">${escapeHtml((l.deskripsi || '').substring(0, 100))}...</p>
                    <button class="detailBtn mt-3 bg-amber-500 text-white px-4 py-2 rounded-xl hover:bg-amber-600" data-id="${l.id}">Lihat Detail</button>
                </div>`;
            });
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function applyFilter() {
            const keyword = document.getElementById('cari').value.toLowerCase();
            const jenis = document.getElementById('filterJenis').value;
            let filtered = semuaLowongan.filter(l => {
                if (l.status !== 'Aktif') return false;
                const matchKeyword = (l.judul && l.judul.toLowerCase().includes(keyword)) ||
                                    (l.perusahaan && l.perusahaan.toLowerCase().includes(keyword));
                const matchJenis = !jenis || (l.jenis_disabilitas === jenis || l.jenis === jenis);
                return matchKeyword && matchJenis;
            });
            render(filtered);
        }

        function showDetail(id) {
            const lowongan = semuaLowongan.find(l => l.id == id);
            if (lowongan) {
                currentLowonganId = id;
                document.getElementById('modalContent').innerHTML = `
                    <p><strong>Judul:</strong> ${escapeHtml(lowongan.judul)}</p>
                    <p><strong>Perusahaan:</strong> ${escapeHtml(lowongan.perusahaan)}</p>
                    <p><strong>Lokasi:</strong> ${escapeHtml(lowongan.lokasi)}</p>
                    <p><strong>Disabilitas:</strong> ${escapeHtml(lowongan.jenis_disabilitas || lowongan.jenis)}</p>
                    <p><strong>Deskripsi:</strong> ${escapeHtml(lowongan.deskripsi)}</p>
                    <p><strong>Gaji:</strong> ${escapeHtml(lowongan.gaji || 'Tidak disebutkan')}</p>
                    <p><strong>Tanggal Posting:</strong> ${lowongan.tgl_posting ? new Date(lowongan.tgl_posting).toLocaleDateString('id-ID') : '-'}</p>
                `;
                document.getElementById('modal').style.display = 'flex';
            }
        }

        function lamar() {
            if (currentLowonganId) {
                const lowonganDipilih = semuaLowongan.find(l => l.id == currentLowonganId);
                if (lowonganDipilih) {
                    localStorage.setItem('lowonganDipilih', JSON.stringify(lowonganDipilih));
                    window.location.href = 'penyandang-daftar.html';
                } else {
                    alert('Data lowongan tidak ditemukan');
                }
            }
        }

        function loadData() {
            semuaLowongan = getLowongan();
            applyFilter();
        }

        document.getElementById('btnCari').addEventListener('click', applyFilter);
        document.getElementById('cari').addEventListener('keypress', (e) => { if (e.key === 'Enter') applyFilter(); });
        document.getElementById('filterJenis').addEventListener('change', applyFilter);
        document.getElementById('list').addEventListener('click', (e) => {
            if (e.target.classList.contains('detailBtn')) {
                const id = parseInt(e.target.getAttribute('data-id'));
                showDetail(id);
            }
        });
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('modal').style.display = 'none';
        });
        document.getElementById('lamarBtn').addEventListener('click', lamar);
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                document.getElementById('modal').style.display = 'none';
            }
        });
        window.addEventListener('storage', (e) => {
            if (e.key === 'daftarLowongan') loadData();
        });
        loadData();
    </script>
</body>
</html>
