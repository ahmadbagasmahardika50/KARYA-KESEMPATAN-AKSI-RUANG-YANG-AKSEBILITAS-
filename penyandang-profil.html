<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><title>Profil Saya</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:'Lexend',sans-serif;}</style></head>
<body class="bg-gray-50"><nav class="bg-white shadow px-6 py-3"><a href="penyandang-lowongan.html">← Kembali</a></nav>
<div class="max-w-2xl mx-auto px-6 py-12"><div class="bg-white p-8 rounded shadow"><h1 class="text-2xl font-bold">Profil Saya</h1><form id="form"><div class="mt-4"><label>Nama Lengkap</label><input type="text" id="nama" class="w-full p-3 rounded bg-gray-100" value="Budi Santoso"></div><div><label>Email</label><input type="email" id="email" class="w-full p-3 rounded bg-gray-100" value="budi@example.com" readonly></div><div><label>Jenis Disabilitas</label><select id="jenis" class="w-full p-3 rounded bg-gray-100"><option>Fisik</option><option>Netra</option><option>Rungu</option><option>Mental</option></select></div><div><label>Telepon</label><input type="text" id="telp" class="w-full p-3 rounded bg-gray-100" value="08123456789"></div><div><label>Alamat</label><textarea id="alamat" class="w-full p-3 rounded bg-gray-100">Jl. Merdeka 10, Surakarta</textarea></div><div class="flex gap-3 mt-6"><button type="button" id="resetBtn" class="border border-blue-900 text-blue-900 px-4 py-2 rounded">Reset</button><button type="submit" class="bg-blue-900 text-white px-4 py-2 rounded">Simpan</button></div></form><hr class="my-8"><h2 class="text-xl font-bold">Riwayat Pendidikan</h2><div id="riwayatList" class="mt-4"></div><div class="flex gap-2 mt-4"><input type="text" id="riwayatInput" placeholder="Tambah riwayat" class="flex-1 p-2 rounded bg-gray-100"><button id="tambahRiwayat" class="bg-amber-500 text-white px-3 py-2 rounded">Tambah</button></div><hr class="my-8"><div class="bg-red-50 p-4 rounded"><h3 class="text-red-800 font-bold">Hapus Akun</h3><button id="hapusAkun" class="mt-2 bg-red-700 text-white px-4 py-2 rounded">Hapus Akun Saya</button></div></div></div>
<script>let riwayat=JSON.parse(localStorage.getItem('riwayat')||'[{"id":1,"teks":"SMK Negeri 2 Surakarta"},{"id":2,"teks":"Pelatihan Web Accessibility"}]');
function renderRiwayat(){let html=''; riwayat.forEach(r=>{html+=`<div class="flex justify-between bg-gray-50 p-2 mt-2 rounded"><span>${r.teks}</span><button class="hapus text-red-600" data-id="${r.id}">Hapus</button></div>`;}); document.getElementById('riwayatList').innerHTML=html;}
document.getElementById('tambahRiwayat').onclick=()=>{let teks=document.getElementById('riwayatInput').value; if(teks){riwayat.push({id:Date.now(),teks}); localStorage.setItem('riwayat',JSON.stringify(riwayat)); renderRiwayat(); document.getElementById('riwayatInput').value=''; alert('Riwayat ditambahkan');}};
document.getElementById('riwayatList').addEventListener('click',(e)=>{if(e.target.classList.contains('hapus')){let id=e.target.getAttribute('data-id'); riwayat=riwayat.filter(r=>r.id!=id); localStorage.setItem('riwayat',JSON.stringify(riwayat)); renderRiwayat(); alert('Riwayat dihapus');}});
document.getElementById('form').addEventListener('submit',e=>{e.preventDefault(); alert('Profil diperbarui (simulasi)');});
document.getElementById('resetBtn').onclick=()=>{document.getElementById('nama').value='Budi Santoso'; document.getElementById('jenis').value='Fisik'; document.getElementById('telp').value='08123456789'; document.getElementById('alamat').value='Jl. Merdeka 10, Surakarta'; alert('Reset ke data awal');};
document.getElementById('hapusAkun').onclick=()=>{if(confirm('Hapus permanen?')){alert('Akun dihapus'); localStorage.clear(); window.location.href='login.html';}};
renderRiwayat();
</script>
</body>
</html>
