<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><title>Kelola Penyandang</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"><style>body{font-family:'Lexend',sans-serif;background:#fcf9f8;}</style></head>
<body><nav class="bg-white shadow px-6 py-3 flex justify-between"><div class="font-bold text-[#001855]">Admin</div><a href="admin-dashboard.html" class="text-[#001855]">← Kembali</a></nav>
<div class="max-w-6xl mx-auto px-6 py-8"><div class="flex justify-between items-center mb-4"><h1 class="text-2xl font-bold text-[#001855]">Data Penyandang</h1><button id="tambahBtn" class="bg-[#001855] text-white px-4 py-2 rounded-xl">+ Tambah</button></div>
<div class="bg-white rounded-xl shadow overflow-hidden"><table class="w-full"><thead class="bg-gray-100"><tr><th class="p-3 text-left">Nama</th><th class="p-3 text-left">Email</th><th class="p-3 text-left">Disabilitas</th><th class="text-center">Aksi</th></tr></thead><tbody id="tabel"></tbody></table></div></div>
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center"><div class="bg-white rounded-2xl w-96 p-6"><h3 class="text-xl font-bold">Form</h3><form id="form"><input type="hidden" id="editId"><div><label>Nama</label><input id="nama" class="w-full p-2 border rounded" required></div><div><label>Email</label><input id="email" class="w-full p-2 border rounded" required></div><div><label>Disabilitas</label><input id="disabilitas" class="w-full p-2 border rounded"></div><div class="mt-4 flex justify-end gap-2"><button type="button" id="closeModal" class="bg-gray-300 px-4 py-2 rounded">Batal</button><button type="submit" class="bg-[#001855] text-white px-4 py-2 rounded">Simpan</button></div></form></div></div>
<script>let data=JSON.parse(localStorage.getItem('penyandang')||'[{"id":1,"nama":"Budi","email":"budi@ex.com","disabilitas":"Fisik"}]');let nextId=data.length?Math.max(...data.map(d=>d.id))+1:1;
function save(){localStorage.setItem('penyandang',JSON.stringify(data));}
function render(){let html='';data.forEach(p=>{html+=`<tr class="border-b"><td class="p-3">${p.nama}</td><td class="p-3">${p.email}</td><td class="p-3">${p.disabilitas}</td><td class="p-3 text-center"><button class="editBtn text-blue-600 mr-2" data-id="${p.id}">Edit</button><button class="delBtn text-red-600" data-id="${p.id}">Hapus</button></td></tr>`;});document.getElementById('tabel').innerHTML=html;}
document.getElementById('tambahBtn').onclick=()=>{document.getElementById('form').reset();document.getElementById('editId').value='';document.getElementById('modal').style.display='flex';};
document.getElementById('closeModal').onclick=()=>document.getElementById('modal').style.display='none';
document.getElementById('form').onsubmit=e=>{e.preventDefault();let id=document.getElementById('editId').value;let newData={nama:document.getElementById('nama').value,email:document.getElementById('email').value,disabilitas:document.getElementById('disabilitas').value};if(id){let idx=data.findIndex(p=>p.id==id);data[idx]={id:parseInt(id),...newData};}else{data.push({id:nextId++,...newData});}save();render();document.getElementById('modal').style.display='none';};
document.getElementById('tabel').addEventListener('click',e=>{if(e.target.classList.contains('editBtn')){let id=e.target.getAttribute('data-id');let p=data.find(p=>p.id==id);document.getElementById('editId').value=p.id;document.getElementById('nama').value=p.nama;document.getElementById('email').value=p.email;document.getElementById('disabilitas').value=p.disabilitas;document.getElementById('modal').style.display='flex';}if(e.target.classList.contains('delBtn')){if(confirm('Hapus?')){data=data.filter(p=>p.id!=e.target.getAttribute('data-id'));save();render();}}});
render();</script></body></html>
