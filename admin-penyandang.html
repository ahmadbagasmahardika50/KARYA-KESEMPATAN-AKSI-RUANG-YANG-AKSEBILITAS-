<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><title>Kelola Penyandang - KARYA</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"><style>body{font-family:'Lexend',sans-serif;background:#fcf9f8;}</style><script>tailwind.config={theme:{extend:{colors:{primary:"#001855",error:"#ba1a1a"},fontFamily:{sans:["Lexend"]}}}}</script></head>
<body><nav class="bg-white shadow px-6 py-4 flex justify-between items-center"><div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary">admin_panel_settings</span><span class="font-bold text-primary">Admin</span></div><a href="admin-dashboard.html" class="text-primary">← Kembali</a></nav>
<div class="max-w-7xl mx-auto px-6 py-8"><div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6"><h1 class="text-2xl font-bold text-primary">Data Penyandang Disabilitas</h1><div class="flex gap-3"><input type="text" id="searchInput" placeholder="Cari nama/email" class="p-2 rounded-xl bg-gray-100 border focus:border-primary"><button id="tambahBtn" class="bg-primary text-white px-4 py-2 rounded-xl flex items-center gap-1"><span class="material-symbols-outlined">add</span> Tambah</button></div></div>
<div class="bg-white rounded-2xl shadow overflow-hidden"><table class="w-full"><thead class="bg-gray-100"><tr><th class="p-3 text-left">Nama</th><th class="p-3 text-left">Email</th><th class="p-3 text-left">Disabilitas</th><th class="p-3 text-center">Aksi</th></tr></thead><tbody id="tabel"></tbody></table></div>
<div class="flex justify-between items-center mt-6"><button id="prevPage" class="px-4 py-2 bg-gray-200 rounded disabled:opacity-50">Sebelumnya</button><span id="pageInfo" class="text-sm">Halaman 1</span><button id="nextPage" class="px-4 py-2 bg-gray-200 rounded disabled:opacity-50">Selanjutnya</button></div></div>
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="bg-white rounded-2xl w-96 p-6"><h3 id="modalTitle" class="text-xl font-bold text-primary flex items-center gap-2"><span class="material-symbols-outlined">person</span> Form</h3><form id="form"><input type="hidden" id="editId"><div class="mt-3"><label>Nama</label><input id="nama" class="w-full p-2 border rounded" required></div><div><label>Email</label><input id="email" class="w-full p-2 border rounded" required></div><div><label>Disabilitas</label><input id="disabilitas" class="w-full p-2 border rounded"></div><div class="mt-5 flex justify-end gap-2"><button type="button" id="closeModal" class="px-4 py-2 bg-gray-300 rounded">Batal</button><button type="submit" class="px-4 py-2 bg-primary text-white rounded">Simpan</button></div></form></div></div>
<script>let data=JSON.parse(localStorage.getItem('penyandang')||'[{"id":1,"nama":"Budi Santoso","email":"budi@ex.com","disabilitas":"Fisik"},{"id":2,"nama":"Siti Aminah","email":"siti@ex.com","disabilitas":"Netra"}]'); let nextId=data.length?Math.max(...data.map(d=>d.id))+1:1; let currentPage=1; const rowsPerPage=5; let filteredData=[...data];
function save(){localStorage.setItem('penyandang',JSON.stringify(data));}
function render(){let start=(currentPage-1)*rowsPerPage; let pageData=filteredData.slice(start,start+rowsPerPage); let html=''; pageData.forEach(p=>{html+=`<tr class="border-b hover:bg-gray-50"><td class="p-3">${p.nama}</td><td class="p-3">${p.email}</td><td class="p-3">${p.disabilitas}</td><td class="p-3 text-center"><button class="editBtn text-blue-600 mr-2" data-id="${p.id}">Edit</button><button class="delBtn text-red-600" data-id="${p.id}">Hapus</button></td></tr>`;}); document.getElementById('tabel').innerHTML=html||'<tr><td colspan="4" class="text-center p-4">Tidak ada data</td></tr>'; let totalPages=Math.ceil(filteredData.length/rowsPerPage); document.getElementById('pageInfo').innerText=`Halaman ${currentPage} dari ${totalPages||1}`; document.getElementById('prevPage').disabled=currentPage===1; document.getElementById('nextPage').disabled=currentPage===totalPages;}
function applyFilter(){let keyword=document.getElementById('searchInput').value.toLowerCase(); filteredData=data.filter(p=>p.nama.toLowerCase().includes(keyword)||p.email.toLowerCase().includes(keyword)); currentPage=1; render();}
document.getElementById('searchInput').addEventListener('input',applyFilter);
document.getElementById('tambahBtn').onclick=()=>{document.getElementById('form').reset();document.getElementById('editId').value='';document.getElementById('modal').style.display='flex';};
document.getElementById('closeModal').onclick=()=>document.getElementById('modal').style.display='none';
document.getElementById('form').onsubmit=e=>{e.preventDefault(); let id=document.getElementById('editId').value; let newData={nama:document.getElementById('nama').value,email:document.getElementById('email').value,disabilitas:document.getElementById('disabilitas').value}; if(id){let idx=data.findIndex(p=>p.id==id); data[idx]={id:parseInt(id),...newData};}else{data.push({id:nextId++,...newData});} save(); applyFilter(); document.getElementById('modal').style.display='none';};
document.getElementById('tabel').addEventListener('click',e=>{if(e.target.classList.contains('editBtn')){let id=e.target.getAttribute('data-id'); let p=data.find(p=>p.id==id); document.getElementById('editId').value=p.id; document.getElementById('nama').value=p.nama; document.getElementById('email').value=p.email; document.getElementById('disabilitas').value=p.disabilitas; document.getElementById('modal').style.display='flex';} if(e.target.classList.contains('delBtn')){if(confirm('Hapus data ini?')){data=data.filter(p=>p.id!=e.target.getAttribute('data-id')); save(); applyFilter();}}});
document.getElementById('prevPage').onclick=()=>{if(currentPage>1){currentPage--;render();}};
document.getElementById('nextPage').onclick=()=>{if(currentPage<Math.ceil(filteredData.length/rowsPerPage)){currentPage++;render();}};
applyFilter();
</script></body></html>
