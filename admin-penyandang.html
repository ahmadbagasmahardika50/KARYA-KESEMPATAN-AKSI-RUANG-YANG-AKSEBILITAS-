<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KARYA - Kelola Perusahaan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>body { font-family: 'Lexend', sans-serif; background-color: #fcf9f8; }</style>
    <script>tailwind.config = { theme: { extend: { colors: { primary: "#001855", secondary: "#7c5800", "secondary-container": "#feb700", surface: "#fcf9f8", "surface-container-high": "#eae7e7", "on-surface-variant": "#43474f", error: "#ba1a1a" }, fontFamily: { sans: ["Lexend"] }, borderRadius: { xl: "0.75rem", "2xl": "1rem" } } } }</script>
</head>
<body class="bg-surface text-on-surface">
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2"><span class="material-symbols-outlined text-2xl text-primary">admin_panel_settings</span><span class="text-xl font-black text-primary">KARYA Admin</span></div>
        <a href="admin-dashboard.html" class="text-primary hover:underline flex items-center gap-1"><span class="material-symbols-outlined text-sm">arrow_back</span> Kembali</a>
    </nav>
    <div class="max-w-6xl mx-auto px-6 py-10">
        <div class="flex justify-between items-center mb-8"><div><h1 class="text-3xl font-black text-primary">Data Perusahaan</h1><p class="text-on-surface-variant">Kelola data perusahaan mitra KARYA.</p></div><button id="tambahBtn" class="bg-primary text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2"><span class="material-symbols-outlined text-lg">add</span> Tambah</button></div>
        <div class="bg-white rounded-2xl shadow-md border border-surface-container-high overflow-x-auto"><table class="w-full text-left"><thead class="bg-surface-container-high"><tr class="border-b border-surface-container"><th class="p-4">Nama</th><th class="p-4">Email</th><th>Telepon</th><th class="text-center">Aksi</th></tr></thead><tbody id="tabel"></tbody></table></div>
    </div>
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4"><div class="bg-white rounded-2xl w-full max-w-md"><div class="flex justify-between p-5 border-b"><h3 id="modalTitle" class="text-xl font-bold text-primary flex items-center gap-2"><span class="material-symbols-outlined">business</span> Tambah Perusahaan</h3><button id="closeModal" class="text-outline hover:text-primary text-2xl">&times;</button></div><form id="form" class="p-5"><input type="hidden" id="editId"><div class="mb-4"><label class="block text-sm font-bold">Nama Perusahaan</label><input type="text" id="nama" class="w-full p-3 rounded-xl bg-surface-container-high" required></div><div class="mb-4"><label class="block text-sm font-bold">Email</label><input type="email" id="email" class="w-full p-3 rounded-xl bg-surface-container-high" required></div><div class="mb-6"><label class="block text-sm font-bold">Telepon</label><input type="text" id="telepon" class="w-full p-3 rounded-xl bg-surface-container-high"></div><div class="flex justify-end gap-3"><button type="button" id="closeModalBtn" class="px-5 py-2 bg-surface-container-high rounded-xl">Batal</button><button type="submit" class="px-5 py-2 bg-primary text-white rounded-xl font-bold">Simpan</button></div></form></div></div>
    <footer class="bg-surface-container-low py-6 px-6 mt-12 border-t text-center text-xs text-outline">© 2026 KARYA. Memberdayakan Kemampuan.</footer>
    <script>
        let data = JSON.parse(localStorage.getItem('perusahaan') || '[{"id":1,"nama":"PT Maju Jaya","email":"info@majujaya.com","telepon":"0211234567"}]');
        let nextId = data.length ? Math.max(...data.map(d=>d.id))+1 : 1;
        function save() { localStorage.setItem('perusahaan', JSON.stringify(data)); }
        function render() { let html=''; data.forEach(p=>{html+=`<tr class="border-b hover:bg-surface-container-low"><td class="p-4">${p.nama}</td><td class="p-4">${p.email}</td><td class="p-4">${p.telepon}</td><td class="p-4 text-center"><button class="editBtn text-primary font-bold mr-3" data-id="${p.id}">Edit</button><button class="delBtn text-error font-bold" data-id="${p.id}">Hapus</button></td></tr>`;}); document.getElementById('tabel').innerHTML=html||'<tr><td colspan="4" class="text-center py-8">Belum ada data</td></tr>'; }
        document.getElementById('tambahBtn').onclick=()=>{document.getElementById('form').reset();document.getElementById('editId').value='';document.getElementById('modal').style.display='flex';};
        document.getElementById('closeModal').onclick=()=>document.getElementById('modal').style.display='none';
        document.getElementById('closeModalBtn').onclick=()=>document.getElementById('modal').style.display='none';
        document.getElementById('form').onsubmit=e=>{e.preventDefault();let id=document.getElementById('editId').value;let newData={nama:document.getElementById('nama').value,email:document.getElementById('email').value,telepon:document.getElementById('telepon').value};if(id){let idx=data.findIndex(p=>p.id==id);data[idx]={id:parseInt(id),...newData};}else{data.push({id:nextId++,...newData});}save();render();document.getElementById('modal').style.display='none';};
        document.getElementById('tabel').addEventListener('click',e=>{if(e.target.classList.contains('editBtn')){let id=e.target.getAttribute('data-id');let p=data.find(p=>p.id==id);document.getElementById('editId').value=p.id;document.getElementById('nama').value=p.nama;document.getElementById('email').value=p.email;document.getElementById('telepon').value=p.telepon;document.getElementById('modal').style.display='flex';}if(e.target.classList.contains('delBtn')){if(confirm('Hapus data?')){data=data.filter(p=>p.id!=e.target.getAttribute('data-id'));save();render();}}});
        render();
    </script>
</body>
</html>
