<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARYA - Kelola Penyandang Disabilitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background: #fcf9f8; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
        .modal-content { background: white; border-radius: 1rem; width: 90%; max-width: 400px; padding: 1.5rem; }
    </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <div class="text-xl font-black text-blue-900">KARYA Admin</div>
    <a href="login.html" onclick="localStorage.removeItem('user')" class="text-red-600">Logout</a>
</nav>

<div class="max-w-6xl mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold text-blue-900">Data Penyandang Disabilitas</h1>
        <button id="tambahBtn" class="bg-blue-900 text-white px-4 py-2 rounded-xl">+ Tambah</button>
    </div>
    <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-100">
                <tr><th class="p-3">Nama</th><th>Email</th><th>Jenis Disabilitas</th><th class="text-center">Aksi</th></tr>
            </thead>
            <tbody id="tabelPenyandang"></tbody>
        </table>
    </div>
</div>

<!-- Modal Form -->
<div id="formModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" class="text-xl font-bold mb-4">Tambah Penyandang</h3>
        <form id="penyandangForm">
            <input type="hidden" id="editId">
            <div class="mb-3"><label>Nama Lengkap</label><input type="text" id="nama" class="w-full p-2 border rounded" required></div>
            <div class="mb-3"><label>Email</label><input type="email" id="email" class="w-full p-2 border rounded" required></div>
            <div class="mb-3"><label>Jenis Disabilitas</label>
                <select id="jenisDisabilitas" class="w-full p-2 border rounded">
                    <option value="Fisik (daksa)">Fisik (daksa)</option>
                    <option value="Netra">Netra</option>
                    <option value="Rungu">Rungu</option>
                    <option value="Mental">Mental</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" class="cancelModalBtn bg-gray-300 px-3 py-1 rounded">Batal</button>
                <button type="submit" class="bg-blue-900 text-white px-3 py-1 rounded">Simpan</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Konfirmasi Hapus -->
<div id="deleteModal" class="modal">
    <div class="modal-content text-center">
        <p class="mb-4">Yakin ingin menghapus data penyandang ini?</p>
        <div class="flex justify-center gap-3">
            <button id="cancelDeleteBtn" class="bg-gray-300 px-3 py-1 rounded">Batal</button>
            <button id="confirmDeleteBtn" class="bg-red-600 text-white px-3 py-1 rounded">Hapus</button>
        </div>
    </div>
</div>

<script>
    // Data penyandang (ambil dari localStorage)
    let penyandang = JSON.parse(localStorage.getItem('penyandang_admin') || '[]');
    let nextId = penyandang.length ? Math.max(...penyandang.map(p => p.id)) + 1 : 1;
    let currentDeleteId = null;

    function saveData() {
        localStorage.setItem('penyandang_admin', JSON.stringify(penyandang));
    }

    function renderTable() {
        const tbody = document.getElementById('tabelPenyandang');
        if (penyandang.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center p-4">Belum ada data</td></tr>';
            return;
        }
        let html = '';
        penyandang.forEach(p => {
            html += `<tr class="border-b hover:bg-gray-50">
                <td class="p-3">${escapeHtml(p.nama)}</td>
                <td class="p-3">${escapeHtml(p.email)}</td>
                <td class="p-3">${escapeHtml(p.jenisDisabilitas || '-')}</td>
                <td class="p-3 text-center">
                    <button class="editBtn text-blue-600 mr-2" data-id="${p.id}">Edit</button>
                    <button class="deleteBtn text-red-600" data-id="${p.id}">Hapus</button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Modal Form
    const formModal = document.getElementById('formModal');
    const deleteModal = document.getElementById('deleteModal');
    const form = document.getElementById('penyandangForm');
    const editIdField = document.getElementById('editId');
    const namaField = document.getElementById('nama');
    const emailField = document.getElementById('email');
    const jenisField = document.getElementById('jenisDisabilitas');
    const modalTitle = document.getElementById('modalTitle');

    function openFormModal(editMode = false, data = null) {
        if (editMode && data) {
            modalTitle.innerText = 'Edit Penyandang';
            editIdField.value = data.id;
            namaField.value = data.nama;
            emailField.value = data.email;
            jenisField.value = data.jenisDisabilitas || 'Fisik (daksa)';
        } else {
            modalTitle.innerText = 'Tambah Penyandang';
            editIdField.value = '';
            form.reset();
            jenisField.value = 'Fisik (daksa)';
        }
        formModal.style.display = 'flex';
    }

    function closeFormModal() {
        formModal.style.display = 'none';
    }

    function closeDeleteModal() {
        deleteModal.style.display = 'none';
        currentDeleteId = null;
    }

    // Submit form
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const id = editIdField.value;
        const newData = {
            nama: namaField.value.trim(),
            email: emailField.value.trim(),
            jenisDisabilitas: jenisField.value
        };
        if (!newData.nama || !newData.email) {
            alert('Nama dan email harus diisi');
            return;
        }
        // Cek duplikat email
        if (!id && penyandang.some(p => p.email === newData.email)) {
            alert('Email sudah terdaftar!');
            return;
        }
        if (id) {
            const idx = penyandang.findIndex(p => p.id == id);
            if (idx !== -1) penyandang[idx] = { id: parseInt(id), ...newData };
        } else {
            penyandang.push({ id: nextId++, ...newData });
        }
        saveData();
        renderTable();
        closeFormModal();
    });

    // Event delegation untuk tombol edit/hapus
    document.getElementById('tabelPenyandang').addEventListener('click', (e) => {
        const target = e.target;
        if (target.classList.contains('editBtn')) {
            const id = parseInt(target.getAttribute('data-id'));
            const data = penyandang.find(p => p.id === id);
            if (data) openFormModal(true, data);
        } else if (target.classList.contains('deleteBtn')) {
            currentDeleteId = parseInt(target.getAttribute('data-id'));
            deleteModal.style.display = 'flex';
        }
    });

    // Konfirmasi hapus
    document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
        if (currentDeleteId) {
            penyandang = penyandang.filter(p => p.id !== currentDeleteId);
            saveData();
            renderTable();
        }
        closeDeleteModal();
    });

    // Batal hapus
    document.getElementById('cancelDeleteBtn').addEventListener('click', closeDeleteModal);

    // Tombol tambah
    document.getElementById('tambahBtn').addEventListener('click', () => openFormModal(false));

    // Tombol batal pada modal form
    document.querySelectorAll('.cancelModalBtn').forEach(btn => btn.addEventListener('click', closeFormModal));

    // Menutup modal jika klik di luar area konten
    window.onclick = (e) => {
        if (e.target === formModal) closeFormModal();
        if (e.target === deleteModal) closeDeleteModal();
    };

    // Inisialisasi tampilan
    renderTable();
</script>
</body>
</html>
