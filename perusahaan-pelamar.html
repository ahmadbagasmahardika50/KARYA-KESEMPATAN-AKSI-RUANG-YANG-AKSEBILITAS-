<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARYA - Data Pelamar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background: #fcf9f8; }
        :focus { outline: 2px solid #feb700; outline-offset: 2px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
        .modal-content { background: white; border-radius: 1rem; width: 90%; max-width: 480px; padding: 1.5rem; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#001855",
                        "primary-container": "#002a84",
                        secondary: "#7c5800",
                        "secondary-container": "#feb700",
                        surface: "#fcf9f8",
                        "surface-container-low": "#f6f3f2",
                        "surface-container-high": "#eae7e7",
                        "on-surface": "#1b1c1c",
                        "on-surface-variant": "#43474f",
                        outline: "#737780",
                        error: "#ba1a1a"
                    },
                    fontFamily: { sans: ["Lexend"] },
                    borderRadius: { xl: "0.75rem", "2xl": "1rem", "3xl": "1.5rem" }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface">

    <!-- Navbar KARYA Perusahaan -->
    <nav class="bg-white shadow-md py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-2xl text-primary">business</span>
            <div class="text-xl font-black text-primary tracking-tighter">KARYA Perusahaan</div>
        </div>
        <div class="space-x-4">
            <a href="perusahaan-dashboard.html" class="text-primary font-medium hover:underline">Dashboard</a>
            <a href="perusahaan-lowongan.html" class="text-primary font-medium hover:underline">Lowongan</a>
            <a href="perusahaan-pelamar.html" class="text-primary font-bold border-b-2 border-secondary-container pb-1">Pelamar</a>
            <a href="perusahaan-profil.html" class="text-primary font-medium hover:underline">Profil</a>
            <a href="login.html" onclick="localStorage.removeItem('user')" class="text-error">Logout</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-primary">Data Pelamar</h1>
            <p class="text-on-surface-variant mt-1">Lihat dan update status lamaran yang masuk untuk lowongan perusahaan Anda.</p>
        </div>

        <!-- Filter & Pencarian -->
        <div class="flex flex-wrap gap-4 mb-6">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-bold text-outline uppercase tracking-wider mb-1">Cari Nama / Email</label>
                <input type="text" id="searchInput" placeholder="Ketik nama atau email..." class="w-full p-3 rounded-xl bg-surface-container-high border border-transparent focus:border-primary transition">
            </div>
            <div class="w-48">
                <label class="block text-xs font-bold text-outline uppercase tracking-wider mb-1">Filter Status</label>
                <select id="statusFilter" class="w-full p-3 rounded-xl bg-surface-container-high border border-transparent focus:border-primary">
                    <option value="all">Semua</option>
                    <option value="pending">Pending</option>
                    <option value="review">Dalam Review</option>
                    <option value="interview">Undang Interview</option>
                    <option value="accepted">Diterima</option>
                    <option value="rejected">Ditolak</option>
                </select>
            </div>
            <div class="flex items-end">
                <button id="filterBtn" class="bg-primary text-white px-5 py-3 rounded-xl font-bold hover:bg-primary/90 shadow-md flex items-center gap-2">
                    <span class="material-symbols-outlined">filter_list</span> Filter
                </button>
            </div>
        </div>

        <!-- Tabel Pelamar -->
        <div class="bg-white rounded-2xl shadow-md border border-surface-container-high overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-surface-container-high">
                        <tr class="border-b border-surface-container">
                            <th class="p-4 font-bold text-primary">Nama</th>
                            <th class="p-4 font-bold text-primary">Jenis Disabilitas</th>
                            <th class="p-4 font-bold text-primary">Lowongan</th>
                            <th class="p-4 font-bold text-primary">Tanggal Lamar</th>
                            <th class="p-4 font-bold text-primary">Status</th>
                            <th class="p-4 font-bold text-primary text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelPelamar"></tbody>
                </table>
            </div>
            <div class="flex justify-between items-center p-4 border-t border-surface-container-high bg-surface-container-low">
                <button id="prevPage" class="px-4 py-2 bg-white rounded-xl border border-surface-container-high disabled:opacity-50">Sebelumnya</button>
                <span id="pageInfo" class="text-sm text-outline">Halaman 1</span>
                <button id="nextPage" class="px-4 py-2 bg-white rounded-xl border border-surface-container-high disabled:opacity-50">Selanjutnya</button>
            </div>
        </div>
    </main>

    <!-- Modal Detail & Update Status -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined">assignment_ind</span> Detail Pelamar
                </h3>
                <button id="closeDetailModal" class="text-outline hover:text-primary text-2xl">&times;</button>
            </div>
            <div id="modalContent" class="space-y-3 text-on-surface-variant"></div>
            <div class="flex justify-end gap-3 mt-6">
                <button id="updateStatusBtn" class="px-4 py-2 bg-secondary-container text-on-secondary rounded-xl font-bold">Update Status</button>
                <button id="closeDetailFooterBtn" class="px-4 py-2 bg-surface-container-high rounded-xl">Tutup</button>
            </div>
        </div>
    </div>

    <footer class="bg-surface-container-low py-6 text-center text-sm text-outline border-t border-surface-container mt-12">
        © 2026 KARYA. Memberdayakan Kemampuan.
    </footer>

    <script>
        // ========== PROTEKSI AKSES: HANYA PERUSAHAAN ==========
        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (!currentUser || currentUser.role !== 'perusahaan') {
            alert('Akses ditolak. Halaman ini khusus untuk perusahaan.');
            window.location.href = 'login.html';
        }

        // Nama perusahaan yang sedang login (digunakan untuk filter lamaran)
        const perusahaanNama = currentUser.nama || "Perusahaan";

        // Ambil data lamaran dari localStorage
        let allLamaran = JSON.parse(localStorage.getItem('lamaran') || '[]');

        // Filter lamaran yang ditujukan ke perusahaan ini
        // Asumsikan setiap lamaran memiliki field `perusahaan` (nama perusahaan tujuan)
        let pelamar = allLamaran.filter(l => l.perusahaan === perusahaanNama);

        // Jika belum ada data lamaran, tambahkan contoh (opsional)
        if (pelamar.length === 0) {
            const contoh = [
                { id: 101, nama: "Budi Santoso", email: "budi@example.com", disabilitas: "Fisik (daksa)", lowongan: "Frontend Developer", tglLamaran: "2026-06-01", status: "pending", pendidikan: "S1 Informatika", perusahaan: perusahaanNama },
                { id: 102, nama: "Siti Aminah", email: "siti@example.com", disabilitas: "Netra", lowongan: "Admin Data Entry", tglLamaran: "2026-06-03", status: "review", pendidikan: "D3 Administrasi", perusahaan: perusahaanNama },
                { id: 103, nama: "Agus Prasetyo", email: "agus@example.com", disabilitas: "Rungu", lowongan: "Customer Service", tglLamaran: "2026-06-05", status: "interview", pendidikan: "S1 Psikologi", perusahaan: perusahaanNama }
            ];
            pelamar = contoh;
            // Simpan juga ke global lamaran jika belum ada
            if (allLamaran.length === 0) {
                localStorage.setItem('lamaran', JSON.stringify(contoh));
            }
        }

        let filtered = [...pelamar];
        let currentPage = 1;
        const rowsPerPage = 5;
        let currentDetailId = null;

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        function getStatusClass(status) {
            switch(status) {
                case 'pending': return 'bg-yellow-100 text-yellow-800';
                case 'review': return 'bg-blue-100 text-blue-800';
                case 'interview': return 'bg-purple-100 text-purple-800';
                case 'accepted': return 'bg-green-100 text-green-800';
                case 'rejected': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100';
            }
        }

        function statusToIndonesian(status) {
            const map = {
                'pending': 'Pending',
                'review': 'Dalam Review',
                'interview': 'Undang Interview',
                'accepted': 'Diterima',
                'rejected': 'Ditolak'
            };
            return map[status] || status;
        }

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const pageData = filtered.slice(start, start + rowsPerPage);
            const tbody = document.getElementById('tabelPelamar');
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-outline">Tidak ada data pelamar</td></tr>';
                document.getElementById('pageInfo').innerText = 'Halaman 0';
                document.getElementById('prevPage').disabled = true;
                document.getElementById('nextPage').disabled = true;
                return;
            }
            let html = '';
            pageData.forEach(p => {
                html += `<tr class="border-b border-surface-container-high hover:bg-surface-container-low">
                    <td class="p-4">${escapeHtml(p.nama)}</td>
                    <td class="p-4">${escapeHtml(p.disabilitas || '-')}</td>
                    <td class="p-4">${escapeHtml(p.lowongan)}</td>
                    <td class="p-4">${escapeHtml(p.tglLamaran || '-')}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-full text-xs font-semibold ${getStatusClass(p.status)}">${statusToIndonesian(p.status)}</span></td>
                    <td class="p-4 text-center">
                        <button class="detailBtn text-primary font-bold hover:underline" data-id="${p.id}">Detail</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            const totalPages = Math.ceil(filtered.length / rowsPerPage);
            document.getElementById('pageInfo').innerText = `Halaman ${currentPage} dari ${totalPages || 1}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }

        function applyFilters() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            filtered = pelamar.filter(p => {
                const matchKeyword = p.nama.toLowerCase().includes(keyword) || (p.email && p.email.toLowerCase().includes(keyword));
                const matchStatus = status === 'all' || p.status === status;
                return matchKeyword && matchStatus;
            });
            currentPage = 1;
            renderTable();
        }

        // Modal detail & update
        const modal = document.getElementById('detailModal');
        function showDetail(id) {
            const p = pelamar.find(p => p.id == id);
            if (!p) return;
            currentDetailId = id;
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <p><strong class="text-primary">Nama:</strong> ${escapeHtml(p.nama)}</p>
                <p><strong class="text-primary">Email:</strong> ${escapeHtml(p.email || '-')}</p>
                <p><strong class="text-primary">Disabilitas:</strong> ${escapeHtml(p.disabilitas || '-')}</p>
                <p><strong class="text-primary">Pendidikan:</strong> ${escapeHtml(p.pendidikan || '-')}</p>
                <p><strong class="text-primary">Lowongan:</strong> ${escapeHtml(p.lowongan)}</p>
                <p><strong class="text-primary">Tanggal Lamar:</strong> ${escapeHtml(p.tglLamaran || '-')}</p>
                <p><strong class="text-primary">Status:</strong> 
                    <select id="statusSelect" class="mt-1 p-2 border border-outline-variant rounded-lg bg-white">
                        <option value="pending" ${p.status === 'pending' ? 'selected' : ''}>Pending</option>
                        <option value="review" ${p.status === 'review' ? 'selected' : ''}>Dalam Review</option>
                        <option value="interview" ${p.status === 'interview' ? 'selected' : ''}>Undang Interview</option>
                        <option value="accepted" ${p.status === 'accepted' ? 'selected' : ''}>Diterima</option>
                        <option value="rejected" ${p.status === 'rejected' ? 'selected' : ''}>Ditolak</option>
                    </select>
                </p>
            `;
            modal.style.display = 'flex';
        }

        function updateStatus() {
            if (!currentDetailId) return;
            const newStatus = document.getElementById('statusSelect').value;
            // Update di array pelamar
            const idx = pelamar.findIndex(p => p.id == currentDetailId);
            if (idx !== -1) {
                pelamar[idx].status = newStatus;
                // Update juga di localStorage 'lamaran' global
                let allLamaranGlobal = JSON.parse(localStorage.getItem('lamaran') || '[]');
                const globalIdx = allLamaranGlobal.findIndex(l => l.id == currentDetailId);
                if (globalIdx !== -1) {
                    allLamaranGlobal[globalIdx].status = newStatus;
                    localStorage.setItem('lamaran', JSON.stringify(allLamaranGlobal));
                } else {
                    // Jika tidak ditemukan, simpan ulang semua
                    localStorage.setItem('lamaran', JSON.stringify(pelamar));
                }
                // Refresh filter dan tabel
                applyFilters();
            }
            modal.style.display = 'none';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Event listeners
        document.getElementById('filterBtn').addEventListener('click', applyFilters);
        document.getElementById('searchInput').addEventListener('keyup', (e) => { if (e.key === 'Enter') applyFilters(); });
        document.getElementById('statusFilter').addEventListener('change', applyFilters);

        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) { currentPage--; renderTable(); }
        });
        document.getElementById('nextPage').addEventListener('click', () => {
            const total = Math.ceil(filtered.length / rowsPerPage);
            if (currentPage < total) { currentPage++; renderTable(); }
        });

        document.getElementById('tabelPelamar').addEventListener('click', (e) => {
            if (e.target.classList.contains('detailBtn')) {
                const id = parseInt(e.target.getAttribute('data-id'));
                showDetail(id);
            }
        });
        document.getElementById('closeDetailModal').addEventListener('click', closeModal);
        document.getElementById('closeDetailFooterBtn').addEventListener('click', closeModal);
        document.getElementById('updateStatusBtn').addEventListener('click', updateStatus);

        window.onclick = (e) => { if (e.target === modal) closeModal(); };

        applyFilters();
    </script>
</body>
</html>
