<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><title>Daftar - KARYA</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"><style>body{font-family:'Lexend',sans-serif;background:#fcf9f8;}</style><script>tailwind.config={theme:{extend:{colors:{primary:"#001855"},fontFamily:{sans:["Lexend"]}}}}</script></head>
<body class="flex items-center justify-center min-h-screen p-4">
<div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8"><div class="text-center"><span class="material-symbols-outlined text-5xl text-primary">person_add</span><h2 class="text-2xl font-bold text-primary mt-2">Daftar Akun Baru</h2></div>
<form id="registerForm" class="mt-6 space-y-3"><div><label>Nama Lengkap</label><input type="text" id="nama" class="w-full p-3 rounded-xl bg-gray-100" required></div><div><label>Email</label><input type="email" id="email" class="w-full p-3 rounded-xl bg-gray-100" required></div><div><label>Password</label><input type="password" id="password" class="w-full p-3 rounded-xl bg-gray-100" required></div><div><label>Tipe Akun</label><select id="role" class="w-full p-3 rounded-xl bg-gray-100"><option value="penyandang">Penyandang Disabilitas</option><option value="perusahaan">Perusahaan</option></select></div><button type="submit" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-primary/90">Daftar</button></form><p class="text-center mt-6">Sudah punya akun? <a href="login.html" class="text-primary font-bold">Masuk</a></p></div>
<script>
if (!localStorage.getItem('registeredUsers')) localStorage.setItem('registeredUsers', JSON.stringify([{nama:"Admin",email:"admin@karya.com",password:"admin",role:"admin"},{nama:"PT Maju",email:"perusahaan@karya.com",password:"perusahaan",role:"perusahaan"},{nama:"Budi",email:"penyandang@karya.com",password:"penyandang",role:"penyandang"}]));
document.getElementById('registerForm').addEventListener('submit',function(e){e.preventDefault();let nama=document.getElementById('nama').value.trim(),email=document.getElementById('email').value.trim(),pwd=document.getElementById('password').value,role=document.getElementById('role').value;if(!nama||!email||!pwd){alert('Semua harus diisi');return;}let users=JSON.parse(localStorage.getItem('registeredUsers'));if(users.some(u=>u.email===email)){alert('Email sudah terdaftar');return;}users.push({nama,email,password:pwd,role});localStorage.setItem('registeredUsers',JSON.stringify(users));alert('Pendaftaran berhasil! Silakan login.');location.href='login.html';});
</script></body></html>
