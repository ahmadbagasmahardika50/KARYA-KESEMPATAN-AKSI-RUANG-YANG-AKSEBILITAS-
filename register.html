<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - KARYA</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Lexend',sans-serif;
    background:
    radial-gradient(circle at top left,#dbeafe 0%,transparent 30%),
    radial-gradient(circle at bottom right,#bfdbfe 0%,transparent 35%),
    #f8fafc;
}

.card{
    animation:fadeIn .5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md">

    <!-- Logo / Header -->
    <div class="text-center mb-6">

        <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-blue-900 text-white text-3xl font-bold shadow-lg">
            K
        </div>

        <h1 class="text-3xl font-bold text-blue-950 mt-4">
            KARYA
        </h1>

        <p class="text-gray-500 mt-2">
            Buat akun baru untuk mulai menggunakan platform
        </p>

    </div>

    <!-- Card -->
    <div class="card bg-white shadow-2xl rounded-3xl p-8 border border-gray-100">

        <h2 class="text-2xl font-bold text-center text-gray-800">
            Daftar Akun Baru
        </h2>

        <form id="registerForm" class="mt-6">

            <!-- Nama -->
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Nama Lengkap
                </label>

                <input
                    type="text"
                    id="nama"
                    required
                    placeholder="Masukkan nama lengkap"
                    class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <!-- Email -->
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    required
                    placeholder="nama@email.com"
                    class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    required
                    placeholder="Minimal 8 karakter"
                    class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <!-- Role -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Tipe Akun
                </label>

                <select
                    id="role"
                    class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">

                    <option value="penyandang">
                        Penyandang Disabilitas
                    </option>

                    <option value="perusahaan">
                        Perusahaan
                    </option>

                </select>
            </div>

            <!-- Button -->
            <button
                type="submit"
                class="w-full bg-blue-900 hover:bg-blue-800 text-white py-3 rounded-xl font-semibold shadow-lg transition duration-300">

                Daftar Sekarang

            </button>

        </form>

        <!-- Divider -->
        <div class="flex items-center my-6">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="px-3 text-gray-400 text-sm">atau</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Login -->
        <p class="text-center text-gray-600">

            Sudah punya akun?

            <a href="login.html"
               class="text-blue-900 font-bold hover:text-blue-700 transition">
                Masuk di sini
            </a>

        </p>

    </div>

</div>

<script>

document.getElementById('registerForm').addEventListener('submit', function(e) {

    e.preventDefault();

    const nama = document.getElementById('nama').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;

    let users = JSON.parse(
        localStorage.getItem('registeredUsers') || '[]'
    );

    // cek email sudah ada
    const existingUser = users.find(
        user => user.email === email
    );

    if(existingUser){
        alert('Email sudah terdaftar!');
        return;
    }

    users.push({
        nama,
        email,
        password,
        role
    });

    localStorage.setItem(
        'registeredUsers',
        JSON.stringify(users)
    );

    alert('Pendaftaran berhasil! Silakan login.');

    window.location.href = 'login.html';

});

</script>

</body>
</html>
