<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<body class="min-h-screen flex items-center justify-center p-6">

```
<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-6">

        <div class="w-20 h-20 mx-auto bg-blue-900 rounded-3xl flex items-center justify-center shadow-xl">
            <span class="text-white text-3xl font-bold">K</span>
        </div>

        <h1 class="text-3xl font-bold text-blue-950 mt-4">
            KARYA
        </h1>

        <p class="text-gray-500 mt-2">
            Platform Karier Inklusif Indonesia
        </p>

    </div>

    <!-- Register Card -->
    <div class="card bg-white rounded-3xl shadow-2xl border border-gray-100 p-8">

        <h2 class="text-2xl font-bold text-center text-gray-800">
            Daftar Akun Baru
        </h2>

        <p class="text-center text-gray-500 text-sm mt-2">
            Buat akun dan mulai perjalanan karier Anda
        </p>

        <form id="registerForm" class="mt-6">

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Nama Lengkap
                </label>

                <input
                    type="text"
                    id="nama"
                    class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="Masukkan nama lengkap"
                    required>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="nama@email.com"
                    required>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="Masukkan password"
                    required>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Tipe Akun
                </label>

                <select
                    id="role"
                    class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">

                    <option value="penyandang">
                        Penyandang Disabilitas
                    </option>

                    <option value="perusahaan">
                        Perusahaan
                    </option>

                </select>
            </div>

            <button
                type="submit"
                class="w-full bg-blue-900 hover:bg-blue-800 text-white py-3 rounded-xl font-semibold shadow-lg transition duration-300">

                Daftar Sekarang

            </button>

        </form>

        <div class="flex items-center my-6">
            <div class="flex-1 border-t border-gray-200"></div>
            <span class="px-3 text-gray-400 text-sm">atau</span>
            <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <p class="text-center text-gray-600">
            Sudah punya akun?

            <a href="login.html"
               class="text-blue-900 font-bold hover:text-blue-700 transition">
                Masuk
            </a>
        </p>

    </div>

</div>

<script>

    // Inisialisasi data default jika kosong
    if(!localStorage.getItem('registeredUsers')) {
        const defaultUsers = [
            {
                nama: "Admin KARYA",
                email: "admin@karya.com",
                password: "admin",
                role: "admin"
            },
            {
                nama: "PT Maju Jaya",
                email: "perusahaan@karya.com",
                password: "perusahaan",
                role: "perusahaan"
            },
            {
                nama: "Budi Santoso",
                email: "penyandang@karya.com",
                password: "penyandang",
                role: "penyandang"
            }
        ];

        localStorage.setItem(
            'registeredUsers',
            JSON.stringify(defaultUsers)
        );
    }

    document.getElementById('registerForm')
    .addEventListener('submit', function(e) {

        e.preventDefault();

        const nama =
            document.getElementById('nama')
            .value.trim();

        const email =
            document.getElementById('email')
            .value.trim();

        const password =
            document.getElementById('password')
            .value;

        const role =
            document.getElementById('role')
            .value;

        if(!nama || !email || !password) {
            alert('Semua field harus diisi');
            return;
        }

        let users = JSON.parse(
            localStorage.getItem('registeredUsers')
        );

        if(users.some(u => u.email === email)) {
            alert('Email sudah terdaftar!');
            return;
        }

        users.push({
            nama,
            email,
            password,
            role
        });

        localStorage.setItem(
            'registeredUsers',
            JSON.stringify(users)
        );

        alert('Pendaftaran berhasil! Silakan login.');

        window.location.href = 'login.html';
    });

</script>
```

</body>
</html>
