<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar - KARYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>body{font-family:'Lexend',sans-serif;}</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-blue-900 text-center">Daftar Akun Baru</h2>
        <form id="registerForm" class="mt-6">
            <div class="mb-3"><label class="block font-bold">Nama Lengkap</label><input type="text" id="nama" class="w-full p-3 rounded-xl bg-gray-100" required></div>
            <div class="mb-3"><label class="block font-bold">Email</label><input type="email" id="email" class="w-full p-3 rounded-xl bg-gray-100" required></div>
            <div class="mb-3"><label class="block font-bold">Password</label><input type="password" id="password" class="w-full p-3 rounded-xl bg-gray-100" required></div>
            <div class="mb-4"><label class="block font-bold">Tipe Akun</label>
                <select id="role" class="w-full p-3 rounded-xl bg-gray-100">
                    <option value="penyandang">Penyandang Disabilitas</option>
                    <option value="perusahaan">Perusahaan</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold">Daftar</button>
        </form>
        <p class="text-center mt-4">Sudah punya akun? <a href="login.html" class="text-blue-900 font-bold">Masuk</a></p>
    </div>
    <script>
        // Pastikan data default ada (admin, dll) agar tidak tertimpa
        const defaultUsers = [
            { nama: "Admin KARYA", email: "admin@karya.com", password: "admin", role: "admin" },
            { nama: "PT Maju Jaya", email: "perusahaan@karya.com", password: "perusahaan", role: "perusahaan" },
            { nama: "Budi Santoso", email: "penyandang@karya.com", password: "penyandang", role: "penyandang" }
        ];
        function ensureDefaultUsers() {
            let users = localStorage.getItem('registeredUsers');
            if (!users) {
                localStorage.setItem('registeredUsers', JSON.stringify(defaultUsers));
                return;
            }
            let parsed = JSON.parse(users);
            let changed = false;
            for (let def of defaultUsers) {
                if (!parsed.some(u => u.email === def.email)) {
                    parsed.push(def);
                    changed = true;
                }
            }
            if (changed) localStorage.setItem('registeredUsers', JSON.stringify(parsed));
        }
        ensureDefaultUsers();

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            if (!nama || !email || !password) { alert('Semua field harus diisi'); return; }
            let users = JSON.parse(localStorage.getItem('registeredUsers'));
            if (users.some(u => u.email === email)) { alert('Email sudah terdaftar!'); return; }
            users.push({ nama, email, password, role });
            localStorage.setItem('registeredUsers', JSON.stringify(users));
            alert('Pendaftaran berhasil! Silakan login.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
