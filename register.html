<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - KARYA</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Lexend',sans-serif;
            background:
                radial-gradient(circle at top left,#dbeafe 0%,transparent 35%),
                radial-gradient(circle at bottom right,#bfdbfe 0%,transparent 35%),
                linear-gradient(to bottom,#f8fafc,#eff6ff);
        }

        .card{
            animation:fadeIn .5s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo-shadow{
            box-shadow:0 20px 40px rgba(30,64,175,.25);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-6">

            <div class="w-24 h-24 mx-auto bg-gradient-to-br from-blue-900 to-blue-700 rounded-3xl flex items-center justify-center logo-shadow">
                <span class="text-white text-4xl font-bold">K</span>
            </div>

            <h1 class="text-3xl font-bold text-blue-950 mt-5">
                KARYA
            </h1>

            <p class="text-gray-500 mt-2">
                Platform Karier Inklusif Indonesia
            </p>

        </div>

        <!-- Card Register -->
        <div class="card bg-white rounded-3xl shadow-2xl border border-gray-100 p-8">

            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">
                    Daftar Akun Baru
                </h2>

                <p class="text-sm text-gray-500 mt-2">
                    Lengkapi data berikut untuk membuat akun
                </p>
            </div>

            <form id="registerForm" class="space-y-4">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Nama Lengkap
                    </label>

                    <input
                        type="text"
                        id="nama"
                        placeholder="Masukkan nama lengkap"
                        class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="nama@email.com"
                        class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Masukkan password"
                        class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Tipe Akun
                    </label>

                    <select
                        id="role"
                        class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">

                        <option value="penyandang">
                            Penyandang Disabilitas
                        </option>

                        <option value="perusahaan">
                            Perusahaan
                        </option>

                    </select>
                </div>

                <button
                    type="submit"
                    class="w-full bg-blue-900 hover:bg-blue-800 text-white py-3 rounded-xl font-semibold shadow-lg transition duration-300">

                    Daftar Sekarang

                </button>

            </form>

            <div class="flex items-center my-6">
                <div class="flex-1 border-t border-gray-200"></div>
                <span class="px-3 text-gray-400 text-sm">atau</span>
                <div class="flex-1 border-t border-gray-200"></div>
            </div>

            <p class="text-center text-gray-600">
                Sudah punya akun?

                <a href="login.html"
                   class="text-blue-900 font-bold hover:text-blue-700 transition">
                    Masuk
                </a>
            </p>

        </div>

    </div>

    <script>

        // Pastikan data default ada (admin, perusahaan, penyandang)
        const defaultUsers = [
            {
                nama: "Admin KARYA",
                email: "admin@karya.com",
                password: "admin",
                role: "admin"
            },
            {
                nama: "PT Maju Jaya",
                email: "perusahaan@karya.com",
                password: "perusahaan",
                role: "perusahaan"
            },
            {
                nama: "Budi Santoso",
                email: "penyandang@karya.com",
                password: "penyandang",
                role: "penyandang"
            }
        ];

        function ensureDefaultUsers() {

            let users = localStorage.getItem('registeredUsers');

            if (!users) {
                localStorage.setItem(
                    'registeredUsers',
                    JSON.stringify(defaultUsers)
                );
                return;
            }

            let parsed = JSON.parse(users);
            let changed = false;

            for (let def of defaultUsers) {

                if (!parsed.some(u => u.email === def.email)) {

                    parsed.push(def);
                    changed = true;

                }
            }

            if (changed) {

                localStorage.setItem(
                    'registeredUsers',
                    JSON.stringify(parsed)
                );

            }
        }

        ensureDefaultUsers();

        document
            .getElementById('registerForm')
            .addEventListener('submit', function(e) {

                e.preventDefault();

                const nama =
                    document.getElementById('nama')
                    .value.trim();

                const email =
                    document.getElementById('email')
                    .value.trim();

                const password =
                    document.getElementById('password')
                    .value;

                const role =
                    document.getElementById('role')
                    .value;

                if (!nama || !email || !password) {

                    alert('Semua field harus diisi');
                    return;

                }

                let users = JSON.parse(
                    localStorage.getItem('registeredUsers')
                );

                if (users.some(u => u.email === email)) {

                    alert('Email sudah terdaftar!');
                    return;

                }

                users.push({
                    nama,
                    email,
                    password,
                    role
                });

                localStorage.setItem(
                    'registeredUsers',
                    JSON.stringify(users)
                );

                alert('Pendaftaran berhasil! Silakan login.');

                window.location.href = 'login.html';

            });

    </script>

</body>
</html>
