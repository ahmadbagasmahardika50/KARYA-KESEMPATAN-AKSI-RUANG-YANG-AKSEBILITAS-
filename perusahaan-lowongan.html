<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Pelamar - Perusahaan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Lexend', sans-serif; }</style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow px-6 py-3">
        <a href="perusahaan-dashboard.html" class="text-blue-600 hover:underline">← Kembali ke Dashboard</a>
    </nav>
    <div class="max-w-6xl mx-auto px-6 py-8">
        <h1 class="text-2xl font-bold text-blue-900">Daftar Pelamar</h1>
        <div class="mt-4 bg-white rounded-2xl shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100">
                    <tr><th class="p-3">Nama</th><th>Disabilitas</th><th>Lowongan Dilamar</th><th>Status Lamaran</th><th>Aksi</th></tr>
                </thead>
                <tbody id="tabel"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Detail -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Detail Pelamar</h3>
            <div id="modalContent"></div>
            <div class="flex justify-end mt-4">
                <button id="closeModal" class="bg-gray-300 px-4 py-2 rounded">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        let pelamar = [
            { id: 1, nama: "Budi Santoso", disabilitas: "Fisik", lowongan: "Frontend Developer", status: "Pending", email: "budi@example.com", pendidikan: "S1 Informatika" },
            { id: 2, nama: "Siti Aminah", disabilitas: "Netra", lowongan: "Admin Data Entry", status: "Dalam Review", email: "siti@example.com", pendidikan: "D3 Administrasi" },
            { id: 3, nama: "Agus Prasetyo", disabilitas: "Rungu", lowongan: "Customer Service", status: "Interview", email: "agus@example.com", pendidikan: "S1 Psikologi" }
        ];

        function render() {
            let html = '';
            pelamar.forEach(p => {
                let statusClass = '';
                if (p.status === 'Pending') statusClass = 'bg-yellow-100 text-yellow-800';
                else if (p.status === 'Dalam Review') statusClass = 'bg-blue-100 text-blue-800';
                else if (p.status === 'Interview') statusClass = 'bg-purple-100 text-purple-800';
                else statusClass = 'bg-gray-100';
                html += `<tr class="border-b">
                    <td class="p-3">${p.nama}</td>
                    <td class="p-3">${p.disabilitas}</td>
                    <td class="p-3">${p.lowongan}</td>
                    <td class="p-3"><span class="px-2 py-1 rounded-full text-xs ${statusClass}">${p.status}</span></td>
                    <td class="p-3"><button class="detailBtn text-blue-600" data-id="${p.id}">Lihat Detail</button></td>
                </tr>`;
            });
            document.getElementById('tabel').innerHTML = html;
        }

        function showDetail(id) {
            const p = pelamar.find(p => p.id == id);
            if (p) {
                document.getElementById('modalContent').innerHTML = `
                    <p><strong>Nama:</strong> ${p.nama}</p>
                    <p><strong>Email:</strong> ${p.email}</p>
                    <p><strong>Disabilitas:</strong> ${p.disabilitas}</p>
                    <p><strong>Pendidikan:</strong> ${p.pendidikan}</p>
                    <p><strong>Lowongan:</strong> ${p.lowongan}</p>
                    <p><strong>Status:</strong> ${p.status}</p>
                `;
                document.getElementById('modal').style.display = 'flex';
            }
        }

        document.getElementById('tabel').addEventListener('click', (e) => {
            if (e.target.classList.contains('detailBtn')) {
                const id = e.target.getAttribute('data-id');
                showDetail(id);
            }
        });
        document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
        render();
    </script>
</body>
</html>
