<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><title>Kelola Lowongan</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:'Lexend',sans-serif;}</style></head>
<body class="bg-gray-50"><nav class="bg-white shadow px-6 py-3"><a href="perusahaan-dashboard.html">← Kembali</a></nav>
<div class="max-w-5xl mx-auto px-6 py-8"><div class="flex justify-between mb-4"><h1 class="text-2xl font-bold">Daftar Lowongan</h1><button id="tambahBtn" class="bg-blue-900 text-white px-4 py-2 rounded">+ Tambah Lowongan</button></div>
<div class="bg-white rounded shadow overflow-hidden"><table class="w-full text-left"><thead class="bg-gray-100"><tr><th class="p-3">Judul</th><th>Lokasi</th><th>Disabilitas</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="tabel"></tbody></table></div></div>
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center"><div class="bg-white p-6 rounded w-96"><h3 class="text-xl font-bold mb-4">Tambah Lowongan</h3><form id="form"><input type="hidden" id="editId"><div><label>Judul</label><input id="judul" class="w-full p-2 border rounded" required></div><div><label>Lokasi</label><input id="lokasi" class="w-full p-2 border rounded" required></div><div><label>Jenis Disabilitas</label><select id="jenis" class="w-full p-2 border rounded"><option>Fisik</option><option>Netra</option><option>Rungu</option><option>Mental</option></select></div><div><label>Deskripsi</label><textarea id="deskripsi" class="w-full p-2 border rounded"></textarea></div><div><label>Status</label><select id="status" class="w-full p-2 border rounded"><option>Aktif</option><option>Tutup</option></select></div><div class="mt-4 flex justify-end gap-2"><button type="button" id="closeModal" class="bg-gray-300 px-3 py-1 rounded">Batal</button><button type="submit" class="bg-blue-900 text-white px-3 py-1 rounded">Simpan</button></div></form></div></div>
<script>let lowongan=JSON.parse(localStorage.getItem('lowongan')||'[{"id":1,"judul":"Frontend Developer","lokasi":"Surakarta","jenis":"Fisik","deskripsi":"Membangun UI aksesibel","status":"Aktif"}]'); let nextId=lowongan.length?Math.max(...lowongan.map(l=>l.id))+1:1;
function save(){localStorage.setItem('lowongan',JSON.stringify(lowongan));}
function render(){let html=''; lowongan.forEach(l=>{html+=`<tr class="border-b"><td class="p-3">${l.judul}</td><td>${l.lokasi}</td><td>${l.jenis}</td><td><span class="px-2 py-1 rounded-full text-xs ${l.status==='Aktif'?'bg-green-100 text-green-800':'bg-red-100'}">${l.status}</span></td><td><button class="editBtn text-blue-600 mr-2" data-id="${l.id}">Edit</button><button class="delBtn text-red-600" data-id="${l.id}">Hapus</button></td></tr>`;}); document.getElementById('tabel').innerHTML=html;}
document.getElementById('tambahBtn').onclick=()=>{document.getElementById('form').reset();document.getElementById('editId').value='';document.getElementById('modal').style.display='flex';};
document.getElementById('closeModal').onclick=()=>document.getElementById('modal').style.display='none';
document.getElementById('form').onsubmit=(e)=>{e.preventDefault();let id=document.getElementById('editId').value;let newData={judul:document.getElementById('judul').value,lokasi:document.getElementById('lokasi').value,jenis:document.getElementById('jenis').value,deskripsi:document.getElementById('deskripsi').value,status:document.getElementById('status').value}; if(id){let idx=lowongan.findIndex(l=>l.id==id); lowongan[idx]={id:parseInt(id),...newData};} else{lowongan.push({id:nextId++,...newData});} save(); render(); document.getElementById('modal').style.display='none';};
document.getElementById('tabel').addEventListener('click',(e)=>{if(e.target.classList.contains('editBtn')){let id=e.target.getAttribute('data-id');let l=lowongan.find(l=>l.id==id);document.getElementById('editId').value=l.id;document.getElementById('judul').value=l.judul;document.getElementById('lokasi').value=l.lokasi;document.getElementById('jenis').value=l.jenis;document.getElementById('deskripsi').value=l.deskripsi;document.getElementById('status').value=l.status;document.getElementById('modal').style.display='flex';} if(e.target.classList.contains('delBtn')){if(confirm('Hapus lowongan?')){lowongan=lowongan.filter(l=>l.id!=e.target.getAttribute('data-id'));save();render();}}});
render();
</script>
</body>
</html>
