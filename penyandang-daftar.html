<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><title>Form Lamaran</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:'Lexend',sans-serif;}</style></head>
<body class="bg-gray-50"><nav class="bg-white shadow px-6 py-3"><a href="penyandang-lowongan.html">← Kembali</a></nav>
<div class="max-w-2xl mx-auto px-6 py-12"><div class="bg-white p-8 rounded shadow"><h1 class="text-2xl font-bold">Form Pendaftaran Lowongan</h1><form id="form"><div class="mt-4"><label>Nama Lengkap</label><input type="text" id="nama" class="w-full p-3 rounded bg-gray-100" value="Budi Santoso" readonly></div><div><label>Email</label><input type="email" id="email" class="w-full p-3 rounded bg-gray-100" value="budi@example.com" readonly></div><div><label>Lowongan</label><input type="text" id="lowonganJudul" class="w-full p-3 rounded bg-gray-100" readonly></div><div><label>Upload CV (PDF)</label><input type="file" accept=".pdf" class="w-full p-2"></div><button type="submit" class="mt-4 w-full bg-blue-900 text-white py-3 rounded">Kirim Lamaran</button></form></div></div>
<script>const urlParams=new URLSearchParams(window.location.search); const lowonganId=urlParams.get('id'); const lowongan=JSON.parse(localStorage.getItem('lowongan')||'[]'); const found=lowongan.find(l=>l.id==lowonganId); if(found) document.getElementById('lowonganJudul').value=found.judul; else document.getElementById('lowonganJudul').value='Lowongan tidak ditemukan';
document.getElementById('form').addEventListener('submit',(e)=>{e.preventDefault(); let lamaran={id:Date.now(), nama:document.getElementById('nama').value, email:document.getElementById('email').value, lowongan:document.getElementById('lowonganJudul').value, disabilitas:'Fisik', status:'Pending', pendidikan:'S1', cv:'dummy.pdf'}; let existing=JSON.parse(localStorage.getItem('lamaran')||'[]'); existing.push(lamaran); localStorage.setItem('lamaran',JSON.stringify(existing)); alert('Lamaran terkirim!'); window.location.href='penyandang-lowongan.html';});</script>
</body>
</html>
