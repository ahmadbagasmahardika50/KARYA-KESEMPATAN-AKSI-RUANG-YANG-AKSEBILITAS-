<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KARYA - Kelola Perusahaan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>body { font-family: 'Lexend', sans-serif; background: #fcf9f8; }</style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-black text-blue-900">KARYA Admin</div>
        <a href="login.html" class="text-red-600" onclick="localStorage.removeItem('user')">Logout</a>
    </nav>
    <div class="max-w-6xl mx-auto px-6 py-8">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold text-blue-900">Data Perusahaan</h1>
            <button id="tambahBtn" class="bg-blue-900 text-white px-4 py-2 rounded-xl">+ Tambah</button>
        </div>
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100"> <tr><th class="p-3">Nama</th><th>Email</th><th>Telepon</th><th class="text-center">Aksi</th></tr> </thead>
                <tbody id="tabel"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-96 p-6">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">Tambah Perusahaan</h3>
            <form id="form">
                <input type="hidden" id="editId">
                <div><label>Nama Perusahaan</label><input id="nama" class="w-full p-2 border rounded" required></div>
                <div><label>Email</label><input id="email" class="w-full p-2 border rounded" required></div>
                <div><label>Telepon</label><input id="telepon" class="w-full p-2 border rounded"></div>
                <div class="mt-4 flex justify-end gap-2">
                    <button type="button" id="closeModal" class="bg-gray-300 px-3 py-1 rounded">Batal</button>
                    <button type="submit" class="bg-blue-900 text-white px-3 py-1 rounded">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Konfirmasi Hapus -->
    <div id="hapusModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl w-80 p-6 text-center">
            <p class="mb-4">Yakin ingin menghapus perusahaan ini?</p>
            <div class="flex justify-center gap-3">
                <button id="batalHapus" class="bg-gray-300 px-3 py-1 rounded">Batal</button>
                <button id="konfirmHapus" class="bg-red-600 text-white px-3 py-1 rounded">Hapus</button>
            </div>
        </div>
    </div>

    <script>
        // Data awal (diambil dari localStorage)
        let perusahaan = JSON.parse(localStorage.getItem('perusahaan_admin') || '[]');
        let nextId = perusahaan.length ? Math.max(...perusahaan.map(p=>p.id)) + 1 : 1;

        function simpan() {
            localStorage.setItem('perusahaan_admin', JSON.stringify(perusahaan));
        }

        function tampilkanTabel() {
            let html = '';
            perusahaan.forEach(p => {
                html += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-3">${escapeHtml(p.nama)}</td>
                    <td class="p-3">${escapeHtml(p.email)}</td>
                    <td class="p-3">${escapeHtml(p.telepon || '-')}</td>
                    <td class="p-3 text-center">
                        <button onclick="editPerusahaan(${p.id})" class="text-blue-600 mr-2">Edit</button>
                        <button onclick="hapusPerusahaan(${p.id})" class="text-red-600">Hapus</button>
                    </td>
                </tr>`;
            });
            document.getElementById('tabel').innerHTML = html;
        }

        function escapeHtml(str) { return (str || '').replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

        window.editPerusahaan = function(id) {
            let p = perusahaan.find(p => p.id === id);
            if(p) {
                document.getElementById('editId').value = p.id;
                document.getElementById('nama').value = p.nama;
                document.getElementById('email').value = p.email;
                document.getElementById('telepon').value = p.telepon || '';
                document.getElementById('modalTitle').innerText = 'Edit Perusahaan';
                document.getElementById('modal').style.display = 'flex';
            }
        }

        let idHapus = null;
        window.hapusPerusahaan = function(id) {
            idHapus = id;
            document.getElementById('hapusModal').style.display = 'flex';
        }

        // Form submit (tambah/edit)
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            let id = document.getElementById('editId').value;
            let data = {
                nama: document.getElementById('nama').value.trim(),
                email: document.getElementById('email').value.trim(),
                telepon: document.getElementById('telepon').value.trim()
            };
            if(!data.nama || !data.email) { alert('Nama dan email wajib diisi'); return; }
            if(id) {
                // edit
                let idx = perusahaan.findIndex(p => p.id == id);
                if(idx !== -1) perusahaan[idx] = { id: parseInt(id), ...data };
            } else {
                // tambah
                perusahaan.push({ id: nextId++, ...data });
            }
            simpan();
            tampilkanTabel();
            document.getElementById('modal').style.display = 'none';
            document.getElementById('form').reset();
        });

        // Hapus konfirmasi
        document.getElementById('konfirmHapus').addEventListener('click', function() {
            if(idHapus !== null) {
                perusahaan = perusahaan.filter(p => p.id !== idHapus);
                simpan();
                tampilkanTabel();
                document.getElementById('hapusModal').style.display = 'none';
                idHapus = null;
            }
        });

        // Tombol batal hapus
        document.getElementById('batalHapus').addEventListener('click', function() {
            document.getElementById('hapusModal').style.display = 'none';
            idHapus = null;
        });

        // Tombol tambah
        document.getElementById('tambahBtn').addEventListener('click', function() {
            document.getElementById('editId').value = '';
            document.getElementById('form').reset();
            document.getElementById('modalTitle').innerText = 'Tambah Perusahaan';
            document.getElementById('modal').style.display = 'flex';
        });

        // Tutup modal form
        document.getElementById('closeModal').addEventListener('click', function() {
            document.getElementById('modal').style.display = 'none';
        });

        // Inisialisasi
        tampilkanTabel();
    </script>
</body>
</html>
