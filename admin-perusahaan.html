<?php
$conn = mysqli_connect("localhost","root","","karya");
if(!$conn){ die("Koneksi gagal: ".mysqli_connect_error()); }

if(isset($_POST['aksi']) && $_POST['aksi']=='tambah'){
    $nama=mysqli_real_escape_string($conn,$_POST['nama']);
    $email=mysqli_real_escape_string($conn,$_POST['email']);
    $telepon=mysqli_real_escape_string($conn,$_POST['telepon']);
    mysqli_query($conn,"INSERT INTO perusahaan(nama,email,telepon) VALUES('$nama','$email','$telepon')");
    header("Location: admin-perusahaan.php"); exit;
}

if(isset($_POST['aksi']) && $_POST['aksi']=='update'){
    $id=(int)$_POST['id'];
    $nama=mysqli_real_escape_string($conn,$_POST['nama']);
    $email=mysqli_real_escape_string($conn,$_POST['email']);
    $telepon=mysqli_real_escape_string($conn,$_POST['telepon']);
    mysqli_query($conn,"UPDATE perusahaan SET nama='$nama',email='$email',telepon='$telepon' WHERE id=$id");
    header("Location: admin-perusahaan.php"); exit;
}

if(isset($_GET['hapus'])){
    $id=(int)$_GET['hapus'];
    mysqli_query($conn,"DELETE FROM perusahaan WHERE id=$id");
    header("Location: admin-perusahaan.php"); exit;
}

$data = mysqli_query($conn,"SELECT * FROM perusahaan ORDER BY id DESC");
