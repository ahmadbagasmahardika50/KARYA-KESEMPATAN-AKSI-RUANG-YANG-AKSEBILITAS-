<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><title>Kelola Perusahaan</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:'Lexend',sans-serif;}</style></head>
<body class="bg-gray-50">
<nav class="bg-white shadow px-6 py-3 flex justify-between"><div class="font-bold text-blue-900">Admin</div><a href="admin-dashboard.html">← Kembali</a></nav>
<div class="max-w-5xl mx-auto px-6 py-8"><div class="flex justify-between mb-4"><h1 class="text-2xl font-bold">Data Perusahaan</h1><button id="tambahBtn" class="bg-blue-900 text-white px-4 py-2 rounded">+ Tambah</button></div>
<div class="bg-white rounded shadow overflow-hidden"><table class="w-full text-left"><thead class="bg-gray-100"><tr><th class="p-3">Nama</th><th>Email</th><th>Telepon</th><th>Aksi</th></tr></thead><tbody id="tabel"></tbody></table></div></div>
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center"><div class="bg-white p-6 rounded w-96"><h3 class="text-xl font-bold mb-4">Tambah</h3><form id="form"><input type="hidden" id="editId"><div><label>Nama Perusahaan</label><input type="text" id="nama" class="w-full p-2 border rounded" required></div><div><label>Email</label><input type="email" id="email" class="w-full p-2 border rounded" required></div><div><label>Telepon</label><input type="text" id="telepon" class="w-full p-2 border rounded"></div><div class="mt-4 flex justify-end gap-2"><button type="button" id="closeModal" class="bg-gray-300 px-3 py-1 rounded">Batal</button><button type="submit" class="bg-blue-900 text-white px-3 py-1 rounded">Simpan</button></div></form></div></div>
<script>let data=JSON.parse(localStorage.getItem('perusahaan')||'[{"id":1,"nama":"PT Maju Jaya","email":"info@majujaya.com","telepon":"021123456"}]'); let nextId=data.length?Math.max(...data.map(d=>d.id))+1:1;
function save(){localStorage.setItem('perusahaan',JSON.stringify(data));}
function render(){let html=''; data.forEach(p=>{html+=`<tr class="border-b"><td class="p-3">${p.nama}</td><td>${p.email}</td><td>${p.telepon}</td><td><button class="editBtn text-blue-600 mr-2" data-id="${p.id}">Edit</button><button class="delBtn text-red-600" data-id="${p.id}">Hapus</button></td></tr>`;}); document.getElementById('tabel').innerHTML=html;}
document.getElementById('tambahBtn').onclick=()=>{document.getElementById('form').reset();document.getElementById('editId').value='';document.getElementById('modal').style.display='flex';};
document.getElementById('closeModal').onclick=()=>document.getElementById('modal').style.display='none';
document.getElementById('form').onsubmit=(e)=>{e.preventDefault();let id=document.getElementById('editId').value;let newData={nama:document.getElementById('nama').value,email:document.getElementById('email').value,telepon:document.getElementById('telepon').value}; if(id){let idx=data.findIndex(p=>p.id==id); data[idx]={id:parseInt(id),...newData};} else{data.push({id:nextId++,...newData});} save(); render(); document.getElementById('modal').style.display='none';};
document.getElementById('tabel').addEventListener('click',(e)=>{if(e.target.classList.contains('editBtn')){let id=e.target.getAttribute('data-id');let p=data.find(p=>p.id==id);document.getElementById('editId').value=p.id;document.getElementById('nama').value=p.nama;document.getElementById('email').value=p.email;document.getElementById('telepon').value=p.telepon;document.getElementById('modal').style.display='flex';} if(e.target.classList.contains('delBtn')){if(confirm('Hapus?')){data=data.filter(p=>p.id!=e.target.getAttribute('data-id'));save();render();}}});
render();
</script>
</body>
</html>
