<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelola Perusahaan</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Lexend',sans-serif;
    background:linear-gradient(to bottom,#f8fafc,#eef2ff);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.modal-show{
    animation:fadeIn .25s ease;
}

.table-row:hover{
    background:#eff6ff;
}

.custom-scroll::-webkit-scrollbar{
    width:6px;
}

.custom-scroll::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:999px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="bg-gradient-to-r from-blue-950 to-blue-800 text-white shadow-lg px-6 py-4 flex justify-between items-center">
    <div>
        <h1 class="font-bold text-xl tracking-wide">
            Admin Panel
        </h1>
    </div>

    <a href="admin-dashboard.html"
       class="px-4 py-2 rounded-xl hover:bg-white/20 transition">
        ← Kembali
    </a>
</nav>

<!-- Content -->
<div class="max-w-6xl mx-auto px-6 py-8">

    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6 mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">
                Data Perusahaan
            </h1>
            <p class="text-gray-500 mt-1">
                Kelola data perusahaan dengan mudah
            </p>
        </div>

        <button id="tambahBtn"
            class="bg-blue-900 hover:bg-blue-800 text-white px-5 py-3 rounded-xl shadow-md transition duration-300">
            + Tambah
        </button>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">

        <div class="px-6 py-4 border-b bg-gray-50">
            <h2 class="font-semibold text-gray-700">
                Daftar Perusahaan
            </h2>
        </div>

        <div class="overflow-x-auto custom-scroll">
            <table class="w-full text-left">

                <thead class="bg-blue-900 text-white">
                    <tr>
                        <th class="p-4 font-medium">Nama</th>
                        <th class="p-4 font-medium">Email</th>
                        <th class="p-4 font-medium">Telepon</th>
                        <th class="p-4 font-medium text-center">Aksi</th>
                    </tr>
                </thead>

                <tbody id="tabel"></tbody>

            </table>
        </div>

    </div>

</div>

<!-- Modal -->
<div id="modal"
     class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 modal-show">

        <div class="mb-5">
            <h3 class="text-2xl font-bold text-blue-900">
                Tambah Perusahaan
            </h3>
            <p class="text-sm text-gray-500">
                Isi informasi perusahaan di bawah ini
            </p>
        </div>

        <form id="form">

            <input type="hidden" id="editId">

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Nama Perusahaan
                </label>
                <input
                    type="text"
                    id="nama"
                    required
                    class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Email
                </label>
                <input
                    type="email"
                    id="email"
                    required
                    class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Telepon
                </label>
                <input
                    type="text"
                    id="telepon"
                    class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <div class="flex justify-end gap-3 mt-6">

                <button
                    type="button"
                    id="closeModal"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-xl transition">
                    Batal
                </button>

                <button
                    type="submit"
                    class="bg-blue-900 hover:bg-blue-800 text-white px-5 py-2 rounded-xl shadow-md transition">
                    Simpan
                </button>

            </div>

        </form>

    </div>

</div>

<script>

let data = JSON.parse(
    localStorage.getItem('perusahaan') ||
    '[{"id":1,"nama":"PT Maju Jaya","email":"info@majujaya.com","telepon":"021123456"}]'
);

let nextId = data.length
    ? Math.max(...data.map(d => d.id)) + 1
    : 1;

function save(){
    localStorage.setItem('perusahaan', JSON.stringify(data));
}

function render(){

    let html = '';

    data.forEach(p => {

        html += `
        <tr class="border-b table-row transition">

            <td class="p-4 font-medium text-gray-800">
                ${p.nama}
            </td>

            <td class="p-4 text-gray-600">
                ${p.email}
            </td>

            <td class="p-4 text-gray-600">
                ${p.telepon}
            </td>

            <td class="p-4 text-center">

                <button
                    class="editBtn bg-blue-100 text-blue-700 px-3 py-2 rounded-lg hover:bg-blue-200 transition mr-2"
                    data-id="${p.id}">
                    Edit
                </button>

                <button
                    class="delBtn bg-red-100 text-red-700 px-3 py-2 rounded-lg hover:bg-red-200 transition"
                    data-id="${p.id}">
                    Hapus
                </button>

            </td>

        </tr>
        `;

    });

    document.getElementById('tabel').innerHTML = html;
}

document.getElementById('tambahBtn').onclick = () => {

    document.getElementById('form').reset();
    document.getElementById('editId').value = '';

    document.querySelector('#modal h3').textContent =
        'Tambah Perusahaan';

    document.getElementById('modal').style.display = 'flex';
};

document.getElementById('closeModal').onclick = () => {
    document.getElementById('modal').style.display = 'none';
};

document.getElementById('form').onsubmit = (e) => {

    e.preventDefault();

    let id = document.getElementById('editId').value;

    let newData = {
        nama: document.getElementById('nama').value,
        email: document.getElementById('email').value,
        telepon: document.getElementById('telepon').value
    };

    if(id){

        let idx = data.findIndex(
            p => p.id == id
        );

        data[idx] = {
            id: parseInt(id),
            ...newData
        };

    } else {

        data.push({
            id: nextId++,
            ...newData
        });

    }

    save();
    render();

    document.getElementById('modal').style.display = 'none';
};

document.getElementById('tabel').addEventListener('click', (e) => {

    if(e.target.classList.contains('editBtn')){

        let id = e.target.getAttribute('data-id');

        let p = data.find(
            p => p.id == id
        );

        document.getElementById('editId').value = p.id;
        document.getElementById('nama').value = p.nama;
        document.getElementById('email').value = p.email;
        document.getElementById('telepon').value = p.telepon;

        document.querySelector('#modal h3').textContent =
            'Edit Perusahaan';

        document.getElementById('modal').style.display = 'flex';
    }

    if(e.target.classList.contains('delBtn')){

        if(confirm('Hapus data perusahaan ini?')){

            data = data.filter(
                p => p.id != e.target.getAttribute('data-id')
            );

            save();
            render();
        }
    }

});

render();

</script>

</body>
</html>
