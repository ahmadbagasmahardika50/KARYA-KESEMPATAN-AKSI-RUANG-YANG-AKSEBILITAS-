<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><title>Kelola Perusahaan</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"><style>body{font-family:'Lexend',sans-serif;background:#fcf9f8;}</style><script>tailwind.config={theme:{extend:{colors:{primary:"#001855",error:"#ba1a1a"},fontFamily:{sans:["Lexend"]}}}}</script></head>
<body class="bg-gray-50">
<nav class="bg-white shadow px-6 py-4 flex justify-between"><div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary">admin_panel_settings</span><span class="font-black text-primary">Admin</span></div><a href="admin-dashboard.html">← Kembali</a></nav>
<div class="max-w-6xl mx-auto px-6 py-8"><div class="flex justify-between"><h1 class="text-2xl font-bold">Data Perusahaan</h1><button id="tambahBtn" class="bg-primary text-white px-4 py-2 rounded">+ Tambah</button></div><div class="bg-white rounded shadow overflow-hidden mt-4"><table class="w-full"><thead class="bg-gray-100"><tr><th class="p-3">Nama</th><th>Email</th><th>Telepon</th><th>Aksi</th></tr></thead><tbody id="tabel"></tbody></table></div></div>
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center"><div class="bg-white p-6 rounded w-96"><h3 id="modalTitle" class="text-xl font-bold">Form</h3><form id="form"><input type="hidden" id="editId"><div><label>Nama Perusahaan</label><input id="nama" class="w-full p-2 border rounded" required></div><div><label>Email</label><input id="email" class="w-full p-2 border rounded" required></div><div><label>Telepon</label><input id="telepon" class="w-full p-2 border rounded"></div><div class="mt-4 flex justify-end gap-2"><button type="button" id="closeModal" class="bg-gray-300 px-3 py-1 rounded">Batal</button><button type="submit" class="bg-primary text-white px-3 py-1 rounded">Simpan</button></div></form></div></div>
<script>let data=JSON.parse(localStorage.getItem('perusahaan')||'[{"id":1,"nama":"PT Maju Jaya","email":"info@majujaya.com","telepon":"021123456"}]'); let nextId=data.length?Math.max(...data.map(d=>d.id))+1:1;
function save(){localStorage.setItem('perusahaan',JSON.stringify(data));}
function render(){let html=''; data.forEach(p=>{html+=`<tr><td class="p-3">${p.nama}</td><td>${p.email}</td><td>${p.telepon}</td><td><button class="editBtn text-primary mr-2" data-id="${p.id}">Edit</button><button class="delBtn text-red-600" data-id="${p.id}">Hapus</button></td></tr>`;}); document.getElementById('tabel').innerHTML=html;}
document.getElementById('tambahBtn').onclick=()=>{document.getElementById('form').reset();document.getElementById('editId').value='';document.getElementById('modal').style.display='flex';};
document.getElementById('closeModal').onclick=()=>document.getElementById('modal').style.display='none';
document.getElementById('form').onsubmit=e=>{e.preventDefault(); let id=document.getElementById('editId').value; let newData={nama:document.getElementById('nama').value,email:document.getElementById('email').value,telepon:document.getElementById('telepon').value}; if(id){let idx=data.findIndex(p=>p.id==id); data[idx]={id:parseInt(id),...newData};}else{data.push({id:nextId++,...newData});} save(); render(); document.getElementById('modal').style.display='none';};
document.getElementById('tabel').addEventListener('click',e=>{if(e.target.classList.contains('editBtn')){let id=e.target.getAttribute('data-id'); let p=data.find(p=>p.id==id); document.getElementById('editId').value=p.id; document.getElementById('nama').value=p.nama; document.getElementById('email').value=p.email; document.getElementById('telepon').value=p.telepon; document.getElementById('modal').style.display='flex';} if(e.target.classList.contains('delBtn')){if(confirm('Hapus?')){data=data.filter(p=>p.id!=e.target.getAttribute('data-id')); save(); render();}}});
render();
</script>
</body>
</html>
