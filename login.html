<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KARYA - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>body{font-family:'Lexend',sans-serif;}</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-blue-900 text-center">Masuk ke KARYA</h2>
        <form id="loginForm" class="mt-6">
            <div class="mb-4"><label class="block font-bold">Email</label><input type="email" id="email" class="w-full p-3 rounded-xl bg-gray-100" required></div>
            <div class="mb-6"><label class="block font-bold">Password</label><input type="password" id="password" class="w-full p-3 rounded-xl bg-gray-100" required></div>
            <button type="submit" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold">Masuk</button>
        </form>
        <p class="text-center mt-4">Belum punya akun? <a href="register.html" class="text-blue-900 font-bold">Daftar</a></p>
    </div>
    <script>
        const defaultUsers = [
            { nama: "Admin KARYA", email: "admin@karya.com", password: "admin", role: "admin" },
            { nama: "PT Maju Jaya", email: "perusahaan@karya.com", password: "perusahaan", role: "perusahaan" },
            { nama: "Budi Santoso", email: "penyandang@karya.com", password: "penyandang", role: "penyandang" }
        ];
        if (!localStorage.getItem('registeredUsers')) {
            localStorage.setItem('registeredUsers', JSON.stringify(defaultUsers));
        } else {
            let users = JSON.parse(localStorage.getItem('registeredUsers'));
            let changed = false;
            for (let def of defaultUsers) {
                if (!users.some(u => u.email === def.email)) {
                    users.push(def);
                    changed = true;
                }
            }
            if (changed) localStorage.setItem('registeredUsers', JSON.stringify(users));
        }
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('registeredUsers'));
            const user = users.find(u => u.email === email && u.password === pwd);
            if (user) {
                localStorage.setItem('user', JSON.stringify({ email: user.email, role: user.role, nama: user.nama }));
                if (user.role === 'admin') location.href = 'admin-dashboard.html';
                else if (user.role === 'perusahaan') location.href = 'perusahaan-dashboard.html';
                else location.href = 'penyandang-lowongan.html';
            } else {
                alert('Email atau password salah!\n\nGunakan:\nadmin@karya.com / admin\nperusahaan@karya.com / perusahaan\npenyandang@karya.com / penyandang');
            }
        });
    </script>
</body>
</html>
