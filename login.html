<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - KARYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>body{font-family:'Lexend',sans-serif;}</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-blue-900 text-center">Masuk ke KARYA</h2>
        <form id="loginForm" class="mt-6">
            <div class="mb-4"><label class="block font-bold">Email</label><input type="email" id="email" class="w-full p-3 rounded-xl bg-gray-100" required></div>
            <div class="mb-6"><label class="block font-bold">Password</label><input type="password" id="password" class="w-full p-3 rounded-xl bg-gray-100" required></div>
            <button type="submit" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold">Masuk</button>
        </form>
        <p class="text-center mt-4">Belum punya akun? <a href="register.html" class="text-blue-900 font-bold">Daftar</a></p>
    </div>
    <script>
        // Data akun contoh (untuk demo)
        const users = [
            { email: "admin@karya.com", password: "admin", role: "admin" },
            { email: "perusahaan@karya.com", password: "perusahaan", role: "perusahaan" },
            { email: "penyandang@karya.com", password: "penyandang", role: "penyandang" }
        ];
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const user = users.find(u => u.email === email && u.password === password);
            if(user) {
                localStorage.setItem('user', JSON.stringify(user));
                if(user.role === 'admin') window.location.href = 'admin-dashboard.html';
                else if(user.role === 'perusahaan') window.location.href = 'perusahaan-dashboard.html';
                else window.location.href = 'penyandang-lowongan.html';
            } else {
                alert('Email atau password salah! Gunakan: admin@karya.com / admin atau perusahaan@karya.com / perusahaan atau penyandang@karya.com / penyandang');
            }
        });
    </script>
</body>
</html>
