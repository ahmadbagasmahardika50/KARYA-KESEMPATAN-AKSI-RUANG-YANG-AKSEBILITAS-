<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KARYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(135deg, #fcf9f8 0%, #f0eeed 100%);
            min-height: 100vh;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0, 24, 85, 0.15);
        }
        .input-focus {
            transition: all 0.2s ease;
        }
        .input-focus:focus {
            border-color: #feb700;
            box-shadow: 0 0 0 3px rgba(254, 183, 0, 0.2);
            transform: scale(1.01);
        }
        .btn-primary {
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            background: #002a84;
            box-shadow: 0 10px 20px -5px rgba(0, 24, 85, 0.3);
        }
        .floating-icon {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#001855",
                        secondary: "#feb700",
                    },
                    fontFamily: { sans: ["Lexend"] },
                    borderRadius: { xl: "0.75rem", "2xl": "1rem" }
                }
            }
        }
    </script>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative overflow-hidden">
    <!-- Background Decorative Blobs -->
    <div class="absolute top-0 left-0 w-72 h-72 bg-primary/5 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-secondary/10 rounded-full blur-3xl translate-x-1/3 translate-y-1/3"></div>

    <div class="w-full max-w-md animate-fade-up">
        <!-- Card Login dengan efek glassmorphism ringan -->
        <div class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl card-hover border border-white/20 p-8">
            <!-- Icon dan Judul -->
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-primary to-primary/80 rounded-2xl shadow-lg mb-4 floating-icon">
                    <span class="material-symbols-outlined text-5xl text-white">work</span>
                </div>
                <h2 class="text-3xl font-black text-primary tracking-tight">Selamat Datang</h2>
                <p class="text-on-surface-variant text-sm mt-1">Masuk ke akun KARYA Anda</p>
            </div>

            <!-- Form Login -->
            <form id="loginForm" class="mt-8 space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-outline mb-1 flex items-center gap-1">
                        <span class="material-symbols-outlined text-base">email</span> Alamat Email
                    </label>
                    <input type="email" id="email" 
                           class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-secondary outline-none input-focus transition"
                           placeholder="nama@perusahaan.com" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-outline mb-1 flex items-center gap-1">
                        <span class="material-symbols-outlined text-base">lock</span> Kata Sandi
                    </label>
                    <input type="password" id="password" 
                           class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-secondary outline-none input-focus transition"
                           placeholder="••••••••" required>
                </div>
                <button type="submit" 
                        class="btn-primary w-full bg-primary text-white py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">login</span> Masuk
                </button>
            </form>

            <!-- Divider -->
            <div class="relative flex items-center justify-center my-6">
                <div class="absolute w-full border-t border-gray-200"></div>
                <span class="relative bg-white px-4 text-sm text-outline">atau</span>
            </div>

            <!-- Link Register -->
            <p class="text-center text-sm text-on-surface-variant">
                Belum punya akun? 
                <a href="register.html" class="text-primary font-bold hover:underline transition flex items-center justify-center gap-1 mt-1">
                    Daftar Sekarang <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </a>
            </p>

            <!-- Demo Credentials -->
            <div class="mt-6 p-3 bg-gray-50 rounded-xl text-center border border-gray-100">
                <p class="text-xs text-outline font-medium">🔐 Demo Akun</p>
                <div class="flex flex-wrap justify-center gap-x-3 gap-y-1 text-xs text-primary mt-1">
                    <span>admin@karya.com / admin</span>
                    <span>•</span>
                    <span>perusahaan@karya.com / perusahaan</span>
                    <span>•</span>
                    <span>penyandang@karya.com / penyandang</span>
                </div>
            </div>
        </div>

        <!-- Footer kecil -->
        <p class="text-center text-xs text-outline/60 mt-6">
            © 2026 KARYA · Memberdayakan Kemampuan
        </p>
    </div>

    <script>
        // Data default akun (sama seperti sebelumnya)
        const defaultUsers = [
            { nama: "Admin KARYA", email: "admin@karya.com", password: "admin", role: "admin" },
            { nama: "PT Maju Jaya", email: "perusahaan@karya.com", password: "perusahaan", role: "perusahaan" },
            { nama: "Budi Santoso", email: "penyandang@karya.com", password: "penyandang", role: "penyandang" }
        ];

        // Inisialisasi localStorage jika kosong
        if (!localStorage.getItem('registeredUsers')) {
            localStorage.setItem('registeredUsers', JSON.stringify(defaultUsers));
        } else {
            let users = JSON.parse(localStorage.getItem('registeredUsers'));
            let changed = false;
            for (let def of defaultUsers) {
                if (!users.some(u => u.email === def.email)) {
                    users.push(def);
                    changed = true;
                }
            }
            if (changed) localStorage.setItem('registeredUsers', JSON.stringify(users));
        }

        // Event submit login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('registeredUsers'));
            const user = users.find(u => u.email === email && u.password === pwd);
            if (user) {
                localStorage.setItem('user', JSON.stringify({ email: user.email, role: user.role, nama: user.nama }));
                if (user.role === 'admin') location.href = 'admin-dashboard.html';
                else if (user.role === 'perusahaan') location.href = 'perusahaan-dashboard.html';
                else location.href = 'penyandang-lowongan.html';
            } else {
                alert('Email atau password salah!\n\nGunakan:\nadmin@karya.com / admin\nperusahaan@karya.com / perusahaan\npenyandang@karya.com / penyandang');
            }
        });
    </script>
</body>
</html>
