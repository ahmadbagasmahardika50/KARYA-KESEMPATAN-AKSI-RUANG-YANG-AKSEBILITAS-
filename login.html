<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - KARYA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>body{font-family:'Lexend',sans-serif;background:#fcf9f8;}</style>
    <script>tailwind.config={theme:{extend:{colors:{primary:"#001855"},fontFamily:{sans:["Lexend"]}}}}</script>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
        <div class="text-center"><span class="material-symbols-outlined text-5xl text-primary">work</span><h2 class="text-2xl font-bold text-primary mt-2">Masuk ke KARYA</h2></div>
        <form id="loginForm" class="mt-6 space-y-4">
            <div><label class="block font-semibold">Email</label><input type="email" id="email" class="w-full p-3 rounded-xl bg-gray-100 border focus:border-primary" required></div>
            <div><label class="block font-semibold">Password</label><input type="password" id="password" class="w-full p-3 rounded-xl bg-gray-100 border focus:border-primary" required></div>
            <button type="submit" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-primary/90 shadow-md transition">Masuk</button>
        </form>
        <p class="text-center mt-6">Belum punya akun? <a href="register.html" class="text-primary font-bold">Daftar</a></p>
    </div>
    <script>
        const defaultUsers = [
            { nama: "Admin KARYA", email: "admin@karya.com", password: "admin", role: "admin" },
            { nama: "PT Maju Jaya", email: "perusahaan@karya.com", password: "perusahaan", role: "perusahaan" },
            { nama: "Budi Santoso", email: "penyandang@karya.com", password: "penyandang", role: "penyandang" }
        ];
        if (!localStorage.getItem('registeredUsers')) localStorage.setItem('registeredUsers', JSON.stringify(defaultUsers));
        else {
            let users = JSON.parse(localStorage.getItem('registeredUsers'));
            let changed = false;
            for (let def of defaultUsers) if (!users.some(u => u.email === def.email)) { users.push(def); changed = true; }
            if (changed) localStorage.setItem('registeredUsers', JSON.stringify(users));
        }
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('registeredUsers'));
            const user = users.find(u => u.email === email && u.password === pwd);
            if (user) {
                localStorage.setItem('user', JSON.stringify({ email: user.email, role: user.role, nama: user.nama }));
                if (user.role === 'admin') location.href = 'admin-dashboard.html';
                else if (user.role === 'perusahaan') location.href = 'perusahaan-dashboard.html';
                else location.href = 'penyandang-lowongan.html';
            } else alert('Email atau password salah!\n\nGunakan:\nadmin@karya.com / admin\nperusahaan@karya.com / perusahaan\npenyandang@karya.com / penyandang');
        });
    </script>
</body>
</html>
